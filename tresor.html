<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trésor de la Loge</title>

    <!-- PWA / Mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e1b4b">

    <!-- Moteurs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icônes & Polices -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root">
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#1e1b4b;color:#a5b4fc;font-weight:700;font-size:1.2rem;letter-spacing:0.12em;font-family:'Inter',sans-serif;">
            Ouverture du Trésor…
        </div>
    </div>

    <!-- Firebase (module) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot }
            from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD25hln1etKinAPcxQw5nxAk7nppvO0lmc",
            authDomain: "reglement-membre.firebaseapp.com",
            projectId: "reglement-membre",
            storageBucket: "reglement-membre.firebasestorage.app",
            messagingSenderId: "988586859186",
            appId: "1:988586859186:web:dc28672c92c9365ab907ab"
        };

        const fbApp = initializeApp(firebaseConfig);
        window.TRESOR_DB = {
            db: getFirestore(fbApp),
            collection, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot
        };
        document.dispatchEvent(new Event('firebase-ready'));
    </script>

    <!-- Application React -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const mkIcon = (faClass) => ({ size = 20, className = '' }) => (
            <i
                className={`${faClass} ${className}`}
                style={{ fontSize: typeof size === 'number' ? `${size}px` : size, lineHeight: 1 }}
                aria-hidden="true"
            />
        );
        const Users         = mkIcon('fas fa-users');
        const Shield        = mkIcon('fas fa-shield');
        const LogOut        = mkIcon('fas fa-right-from-bracket');
        const Plus          = mkIcon('fas fa-plus');
        const Trash2        = mkIcon('fas fa-trash');
        const Edit2         = mkIcon('fas fa-pen');
        const Calendar      = mkIcon('fas fa-calendar');
        const Euro          = mkIcon('fas fa-euro-sign');
        const Lock          = mkIcon('fas fa-lock');
        const UserPlus      = mkIcon('fas fa-user-plus');
        const Save          = mkIcon('fas fa-floppy-disk');
        const XIcon         = mkIcon('fas fa-xmark');
        const Search        = mkIcon('fas fa-magnifying-glass');
        const CreditCard    = mkIcon('fas fa-credit-card');
        const Banknote      = mkIcon('fas fa-money-bill');
        const FileSignature = mkIcon('fas fa-file-signature');
        const Key           = mkIcon('fas fa-key');
        const ChevronDown   = mkIcon('fas fa-chevron-down');
        const ChevronUp     = mkIcon('fas fa-chevron-up');

        const CAPITATION_CIBLE = 200;
        const PAYMENT_METHODS = [
            { id: 'virement', label: 'Virement',  icon: CreditCard    },
            { id: 'cheque',   label: 'Chèque',    icon: FileSignature },
            { id: 'especes',  label: 'Espèces',   icon: Banknote      },
        ];

        const generateRandomPin = () => {
            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let pin = '';
            for (let i = 0; i < 4; i++) pin += chars.charAt(Math.floor(Math.random() * chars.length));
            return pin;
        };

        function App() {
            const [users,        setUsers]        = useState([]);
            const [payments,     setPayments]     = useState([]);
            const [loggedInUser, setLoggedInUser] = useState(null);
            const [isLoading,    setIsLoading]    = useState(true);

            useEffect(() => {
                let unsubUsers, unsubPayments;

                const setup = async () => {
                    if (!window.TRESOR_DB) {
                        await new Promise(r => document.addEventListener('firebase-ready', r, { once: true }));
                    }
                    const { db, collection, addDoc, onSnapshot } = window.TRESOR_DB;

                    let usersReady    = false;
                    let paymentsReady = false;
                    const checkReady  = () => { if (usersReady && paymentsReady) setIsLoading(false); };

                    unsubUsers = onSnapshot(collection(db, 'users'), async (snap) => {
                        let loadedUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        if (!loadedUsers.find(u => u.role === 'admin')) {
                            const admin = { name: 'Laurent Mienville (Trésorier)', role: 'admin', pin: '20LM' };
                            const ref   = await addDoc(collection(db, 'users'), admin);
                            loadedUsers.push({ id: ref.id, ...admin });
                        }
                        setUsers(loadedUsers);
                        usersReady = true;
                        checkReady();
                    }, err => console.error('Erreur users :', err));

                    unsubPayments = onSnapshot(collection(db, 'payments'), (snap) => {
                        setPayments(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                        paymentsReady = true;
                        checkReady();
                    }, err => console.error('Erreur payments :', err));
                };

                setup();
                return () => { unsubUsers?.(); unsubPayments?.(); };
            }, []);

            if (isLoading) return (
                <div className="min-h-screen flex items-center justify-center bg-gray-50 text-indigo-900 font-bold text-xl animate-pulse">
                    Ouverture du Trésor…
                </div>
            );

            if (!loggedInUser)
                return <LoginScreen users={users} onLogin={setLoggedInUser} />;

            if (loggedInUser.role === 'admin')
                return (
                    <AdminDashboard
                        users={users} setUsers={setUsers}
                        payments={payments} setPayments={setPayments}
                        onLogout={() => setLoggedInUser(null)}
                        currentUser={loggedInUser}
                        setLoggedInUser={setLoggedInUser}
                    />
                );

            return (
                <MemberDashboard
                    user={loggedInUser}
                    payments={payments.filter(p => String(p.memberId) === String(loggedInUser.id))}
                    onLogout={() => setLoggedInUser(null)}
                />
            );
        }

        function LoginScreen({ users, onLogin }) {
            const [selectedUserId, setSelectedUserId] = useState('');
            const [pin,       setPin]       = useState('');
            const [error,     setError]     = useState('');
            const [loginMode, setLoginMode] = useState('admin');

            const adminUser   = users.find(u => u.role === 'admin');
            const memberUsers = users.filter(u => u.role === 'member');

            const handleSubmit = (e) => {
                e.preventDefault();
                setError('');
                const upperPin = pin.toUpperCase();

                if (loginMode === 'admin') {
                    if (upperPin === adminUser?.pin) onLogin(adminUser);
                    else setError('Code Trésorier incorrect.');
                } else {
                    if (!selectedUserId) { setError('Veuillez sélectionner votre nom.'); return; }
                    const user = users.find(u => String(u.id) === String(selectedUserId));
                    if (user && user.pin === upperPin) onLogin(user);
                    else setError("Code d'accès incorrect.");
                }
            };

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
                    <div className="sm:mx-auto sm:w-full sm:max-w-md">
                        <div className="flex justify-center text-indigo-900 mb-4"><Shield size={48} /></div>
                        <h2 className="text-center text-3xl font-extrabold text-gray-900">Trésor de la Loge</h2>
                        <p className="mt-2 text-center text-sm text-gray-600 font-bold uppercase tracking-widest">Gestion des Capitations</p>
                    </div>
                    <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
                        <div className="bg-white py-8 px-4 shadow-xl sm:rounded-xl sm:px-10 border border-gray-100">
                            <div className="flex justify-center space-x-4 mb-8">
                                <button onClick={() => { setLoginMode('admin'); setError(''); setPin(''); }} className={`px-4 py-2 flex items-center rounded-lg font-bold transition-all ${loginMode === 'admin' ? 'bg-indigo-900 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
                                    <Shield size={18} className="mr-2" /> Plateau du Trésorier
                                </button>
                                <button onClick={() => { setLoginMode('member'); setError(''); setPin(''); }} className={`px-4 py-2 flex items-center rounded-lg font-bold transition-all ${loginMode === 'member' ? 'bg-blue-800 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
                                    <Users size={18} className="mr-2" /> Frère/Sœur
                                </button>
                            </div>
                            <form className="space-y-6" onSubmit={handleSubmit}>
                                {loginMode === 'member' && (
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">Identité</label>
                                        <select value={selectedUserId} onChange={e => setSelectedUserId(e.target.value)} className="block w-full pl-3 pr-10 py-3 text-base border-gray-300 focus:outline-none focus:ring-blue-800 focus:border-blue-800 sm:text-sm rounded-lg border bg-gray-50">
                                            <option value="">-- Sélectionnez votre nom --</option>
                                            {memberUsers.sort((a, b) => a.name.localeCompare(b.name)).map(u => (
                                                <option key={u.id} value={u.id}>{u.name}</option>
                                            ))}
                                        </select>
                                    </div>
                                )}
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">{loginMode === 'admin' ? "Code d'accès du Trésorier" : "Code d'accès personnel"}</label>
                                    <div className="relative rounded-lg shadow-sm">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Lock className="h-5 w-5 text-gray-400" size={20} /></div>
                                        <input type="text" value={pin} onChange={e => setPin(e.target.value.toUpperCase())} className="focus:ring-indigo-800 focus:border-indigo-800 block w-full pl-10 sm:text-sm border-gray-300 rounded-lg py-3 border bg-gray-50 font-mono tracking-widest uppercase text-lg" placeholder="Renseigner votre code d'accès" maxLength={6} />
                                    </div>
                                </div>
                                {error && <div className="text-red-600 text-sm font-bold bg-red-50 p-3 rounded-lg border border-red-100 text-center">{error}</div>}
                                <button type="submit" className={`w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-bold text-white ${loginMode === 'admin' ? 'bg-indigo-900 hover:bg-indigo-800' : 'bg-blue-800 hover:bg-blue-700'} transition-colors mt-4`}>Accéder au Trésor</button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        function AdminDashboard({ users, setUsers, payments, setPayments, onLogout, currentUser, setLoggedInUser }) {
            const [activeTab,        setActiveTab]        = useState('members');
            const [expandedMemberId, setExpandedMemberId] = useState(null);
            const [modalConfig,      setModalConfig]      = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: null });
            const [editingPaymentId, setEditingPaymentId] = useState(null);
            const [payMemberId,      setPayMemberId]      = useState('');
            const [payAmount,        setPayAmount]        = useState('');
            const [payDate,          setPayDate]          = useState('');
            const [payMethod,        setPayMethod]        = useState('virement');
            const [payNote,          setPayNote]          = useState('');
            const [newMemberName,   setNewMemberName]   = useState('');
            const [searchTerm,      setSearchTerm]      = useState('');
            const [editingMemberId, setEditingMemberId] = useState(null);
            const [editMemberName,  setEditMemberName]  = useState('');
            const [isEditingAdmin, setIsEditingAdmin] = useState(false);
            const [adminNameInput, setAdminNameInput] = useState(currentUser.name);
            const [isProcessing,   setIsProcessing]   = useState(false);

            const members = users.filter(u => u.role === 'member');
            const maxMembersLimit = 60;

            const getMemberStatus = (total) => {
                if (total >= CAPITATION_CIBLE) return { color: 'bg-green-50 text-green-700 border-green-200', dot: 'bg-green-500', label: 'À jour' };
                if (total > 0)                return { color: 'bg-yellow-50 text-yellow-700 border-yellow-200', dot: 'bg-yellow-500', label: 'En cours' };
                return { color: 'bg-red-50 text-red-700 border-red-200', dot: 'bg-red-500', label: 'Aucun versement' };
            };

            const showModal = (type, title, message, onConfirm = null) => setModalConfig({ isOpen: true, type, title, message, onConfirm });
            const closeModal = () => setModalConfig(m => ({ ...m, isOpen: false }));
            const getMethodDisplay = (methodId) => { const method = PAYMENT_METHODS.find(m => m.id === methodId); return method ? { label: method.label, icon: method.icon } : { label: 'Inconnu', icon: Euro }; };

            const handleUpdateAdminName = async () => {
                if (!adminNameInput.trim() || isProcessing) return;
                setIsProcessing(true);
                const { db, doc, updateDoc } = window.TRESOR_DB;
                try {
                    await updateDoc(doc(db, 'users', currentUser.id), { name: adminNameInput });
                    setUsers(users.map(u => String(u.id) === String(currentUser.id) ? { ...u, name: adminNameInput } : u));
                    setLoggedInUser({ ...currentUser, name: adminNameInput });
                    setIsEditingAdmin(false);
                } catch { showModal('alert', 'Erreur', 'Erreur lors de la modification du nom.'); }
                setIsProcessing(false);
            };

            const handleSavePayment = async (e) => {
                e.preventDefault();
                if (!payMemberId || !payAmount || !payDate || !payMethod || isProcessing) return;
                setIsProcessing(true);
                const { db, doc, updateDoc, addDoc, collection } = window.TRESOR_DB;
                try {
                    if (editingPaymentId) {
                        const data = { memberId: payMemberId, amount: parseFloat(payAmount), date: payDate, method: payMethod, note: payNote };
                        await updateDoc(doc(db, 'payments', editingPaymentId), data);
                        setPayments(payments.map(p => p.id === editingPaymentId ? { id: editingPaymentId, ...data } : p));
                        setEditingPaymentId(null);
                    } else {
                        const data = { memberId: payMemberId, amount: parseFloat(payAmount), date: payDate, method: payMethod, note: payNote };
                        const ref = await addDoc(collection(db, 'payments'), data);
                        setPayments([...payments, { id: ref.id, ...data }]);
                    }
                    setPayMemberId(''); setPayAmount(''); setPayDate(''); setPayNote(''); setPayMethod('virement');
                } catch { showModal('alert', 'Erreur', 'Erreur lors de la sauvegarde du paiement.'); }
                setIsProcessing(false);
            };

            const editPayment = (payment) => { setEditingPaymentId(payment.id); setPayMemberId(payment.memberId); setPayAmount(payment.amount); setPayDate(payment.date); setPayMethod(payment.method || 'virement'); setPayNote(payment.note || ''); window.scrollTo({ top: 0, behavior: 'smooth' }); };
            const deletePayment = (id) => { showModal('confirm', 'Supprimer le versement', 'Voulez-vous vraiment supprimer définitivement ce versement ?', async () => { closeModal(); const { db, doc, deleteDoc } = window.TRESOR_DB; await deleteDoc(doc(db, 'payments', id)); setPayments(payments.filter(p => p.id !== id)); }); };
            const cancelEdit = () => { setEditingPaymentId(null); setPayMemberId(''); setPayAmount(''); setPayDate(''); setPayMethod('virement'); setPayNote(''); };

            const handleAddMember = async (e) => {
                e.preventDefault();
                if (!newMemberName.trim() || isProcessing) return;
                if (members.length >= maxMembersLimit) { showModal('alert', 'Limite atteinte', 'Le nombre maximum de Frères/Sœurs est atteint.'); return; }
                setIsProcessing(true);
                const { db, collection, addDoc } = window.TRESOR_DB;
                try {
                    const member = { name: newMemberName, role: 'member', pin: generateRandomPin() };
                    const ref = await addDoc(collection(db, 'users'), member);
                    setUsers([...users, { id: ref.id, ...member }]);
                    setNewMemberName('');
                } catch { showModal('alert', 'Erreur', "Erreur lors de l'intégration du Frère/Sœur."); }
                setIsProcessing(false);
            };

            const handleUpdateMemberName = async (memberId) => {
                if (!editMemberName.trim() || isProcessing) return;
                setIsProcessing(true);
                const { db, doc, updateDoc } = window.TRESOR_DB;
                try {
                    await updateDoc(doc(db, 'users', memberId), { name: editMemberName });
                    setUsers(users.map(u => String(u.id) === String(memberId) ? { ...u, name: editMemberName } : u));
                    setEditingMemberId(null); setEditMemberName('');
                } catch { showModal('alert', 'Erreur', 'Erreur lors de la modification du nom.'); }
                setIsProcessing(false);
            };

            const deleteMember = (memberId) => {
                const memberPayments = payments.filter(p => String(p.memberId) === String(memberId));
                if (memberPayments.length > 0) { showModal('alert', 'Action impossible', `Ce Frère/Sœur a ${memberPayments.length} versement(s) enregistré(s). Veuillez d'abord les supprimer du registre.`); return; }
                showModal('confirm', 'Rayer du Tableau', "Voulez-vous vraiment retirer ce Frère/Sœur du Tableau de Loge ? Son accès sera détruit.", async () => { closeModal(); const { db, doc, deleteDoc } = window.TRESOR_DB; await deleteDoc(doc(db, 'users', memberId)); setUsers(users.filter(u => u.id !== memberId)); });
            };

            const filteredMembers = members.filter(m => m.name.toLowerCase().includes(searchTerm.toLowerCase()) || m.pin.toLowerCase().includes(searchTerm.toLowerCase()));
            const totalAsso      = payments.reduce((s, p) => s + parseFloat(p.amount || 0), 0);
            const objectifGlobal = members.length * CAPITATION_CIBLE;
            const resteGlobal    = Math.max(0, objectifGlobal - totalAsso);

            return (
                <div className="min-h-screen bg-gray-100 pb-12">
                    <nav className="bg-indigo-950 shadow-lg border-b-4 border-indigo-900">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-16">
                                <div className="flex items-center text-white font-extrabold text-xl tracking-tight"><Shield className="mr-3 text-indigo-400" size={24} /> Plateau du Trésorier</div>
                                <div className="flex items-center">
                                    {isEditingAdmin ? (
                                        <div className="flex items-center mr-2 sm:mr-6 bg-indigo-900 border border-indigo-700 p-1 rounded-lg">
                                            <input type="text" value={adminNameInput} onChange={e => setAdminNameInput(e.target.value)} className="w-28 sm:w-48 px-2 py-1 text-sm font-bold text-gray-900 rounded-md focus:outline-none" autoFocus />
                                            <button onClick={handleUpdateAdminName} className="p-1 ml-1 text-green-400 hover:bg-indigo-800 rounded transition-colors"><Save size={16} /></button>
                                            <button onClick={() => setIsEditingAdmin(false)} className="p-1 ml-1 text-red-400 hover:bg-indigo-800 rounded transition-colors"><XIcon size={16} /></button>
                                        </div>
                                    ) : (
                                        <span className="text-indigo-200 mr-4 sm:mr-6 flex items-center font-medium text-sm">
                                            <span className="hidden sm:inline">Officier : </span>
                                            <strong className="text-white sm:ml-1.5 mr-2">{currentUser.name}</strong>
                                            <button onClick={() => { setAdminNameInput(currentUser.name); setIsEditingAdmin(true); }} className="text-indigo-400 hover:text-white p-1 hover:bg-indigo-800 rounded transition-colors"><Edit2 size={14} /></button>
                                        </span>
                                    )}
                                    <button onClick={onLogout} className="bg-indigo-900 hover:bg-red-700 text-white px-3 py-2 rounded-lg flex items-center transition-colors text-sm font-bold shadow-sm"><LogOut size={16} className="sm:mr-2" /> <span className="hidden sm:inline">Quitter l'office</span></button>
                                </div>
                            </div>
                        </div>
                    </nav>
                    <div className="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
                        <div className="mb-8 grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-200 flex items-center"><div className="bg-indigo-100 p-4 rounded-xl text-indigo-900 mr-4"><Euro size={28} /></div><div><h2 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Trésor de la Loge</h2><p className="text-3xl font-black text-gray-900">{totalAsso.toFixed(2)} <span className="text-xl text-gray-500">€</span></p><p className="text-xs font-medium text-indigo-700 mt-1">Prévisionnel global : {objectifGlobal.toFixed(2)} €</p></div></div>
                            <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-200 flex items-center"><div className="bg-yellow-100 p-4 rounded-xl text-yellow-700 mr-4"><Calendar size={28} /></div><div><h2 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Reste à percevoir</h2><p className="text-3xl font-black text-gray-900">{resteGlobal.toFixed(2)} <span className="text-xl text-gray-500">€</span></p><p className="text-xs font-medium text-yellow-700 mt-1">Pour que la Loge soit à jour</p></div></div>
                            <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-200 flex items-center"><div className="bg-blue-100 p-4 rounded-xl text-blue-800 mr-4"><Users size={28} /></div><div><h2 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Frères/Sœurs sur le Tableau</h2><p className="text-3xl font-black text-gray-900">{members.length} <span className="text-xl text-gray-400 font-medium">/ {maxMembersLimit}</span></p><p className="text-xs font-medium text-blue-700 mt-1">Soit {CAPITATION_CIBLE} € par Frère/Sœur</p></div></div>
                        </div>
                        <div className="mb-8 flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-4 bg-white p-2 rounded-xl shadow-sm w-full sm:w-auto border border-gray-200">
                            <button onClick={() => setActiveTab('members')} className={`px-6 py-3 rounded-lg font-bold transition-all flex items-center justify-center flex-1 sm:flex-none ${activeTab === 'members' ? 'bg-indigo-900 text-white shadow-md' : 'bg-transparent text-gray-600 hover:bg-gray-100'}`}><UserPlus size={18} className="mr-2" /> Tableau de Loge & Codes</button>
                            <button onClick={() => setActiveTab('payments')} className={`px-6 py-3 rounded-lg font-bold transition-all flex items-center justify-center flex-1 sm:flex-none ${activeTab === 'payments' ? 'bg-indigo-900 text-white shadow-md' : 'bg-transparent text-gray-600 hover:bg-gray-100'}`}><CreditCard size={18} className="mr-2" /> Saisir un règlement</button>
                        </div>
                        {activeTab === 'payments' && (
                            <div className="space-y-8 animate-fade">
                                <div className="bg-white shadow-md rounded-2xl p-6 md:p-8 border-t-8 border-indigo-900">
                                    <h3 className="text-2xl font-black text-gray-900 mb-6 flex items-center">{editingPaymentId ? <><Edit2 className="mr-3 text-indigo-900" size={28} /> Modifier le règlement</> : <><Plus className="mr-3 text-indigo-900" size={28} /> Enregistrer une capitation</>}</h3>
                                    <form onSubmit={handleSavePayment} className="grid grid-cols-1 gap-y-6 gap-x-6 sm:grid-cols-6">
                                        <div className="sm:col-span-3"><label className="block text-sm font-bold text-gray-700 mb-2">Frère/Sœur *</label><select required value={payMemberId} onChange={e => setPayMemberId(e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded-xl py-3 px-4 focus:ring-2 focus:ring-indigo-800 focus:border-indigo-800 font-medium text-gray-900"><option value="">Sélectionnez un Frère/Sœur…</option>{members.sort((a, b) => a.name.localeCompare(b.name)).map(m => <option key={m.id} value={m.id}>{m.name}</option>)}</select></div>
                                        <div className="sm:col-span-3"><label className="block text-sm font-bold text-gray-700 mb-2">Date *</label><input type="date" required value={payDate} onChange={e => setPayDate(e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded-xl py-3 px-4 focus:ring-2 focus:ring-indigo-800 focus:border-indigo-800 font-medium text-gray-900" /></div>
                                        <div className="sm:col-span-3"><label className="block text-sm font-bold text-gray-700 mb-2">Montant (€) *</label><input type="number" step="0.01" min="0" required value={payAmount} onChange={e => setPayAmount(e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded-xl py-3 px-4 focus:ring-2 focus:ring-indigo-800 focus:border-indigo-800 font-black text-indigo-900 text-lg" placeholder="0.00" /></div>
                                        <div className="sm:col-span-3"><label className="block text-sm font-bold text-gray-700 mb-2">Mode de règlement *</label><select required value={payMethod} onChange={e => setPayMethod(e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded-xl py-3 px-4 focus:ring-2 focus:ring-indigo-800 focus:border-indigo-800 font-medium text-gray-900">{PAYMENT_METHODS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}</select></div>
                                        <div className="sm:col-span-6"><label className="block text-sm font-bold text-gray-700 mb-2">Remarque interne (Optionnel)</label><input type="text" value={payNote} onChange={e => setPayNote(e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded-xl py-3 px-4 focus:ring-2 focus:ring-indigo-800 focus:border-indigo-800 text-gray-900" placeholder="Ex: Reste 50 € à régler à la prochaine Tenue…" /></div>
                                        <div className="sm:col-span-6 flex justify-end space-x-4 pt-4 border-t border-gray-200">
                                            {editingPaymentId && <button type="button" onClick={cancelEdit} className="px-6 py-3 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors">Annuler</button>}
                                            <button type="submit" disabled={isProcessing} className="px-8 py-3 rounded-xl shadow-lg shadow-indigo-200 font-black text-white bg-indigo-900 hover:bg-indigo-800 disabled:opacity-50 transition-all flex items-center">{editingPaymentId ? <><Save className="mr-2" size={18} /> Mettre à jour</> : <><Plus className="mr-2" size={18} /> Valider le versement</>}</button>
                                        </div>
                                    </form>
                                </div>
                                <div className="bg-white shadow-sm border border-gray-200 rounded-2xl overflow-hidden">
                                    <div className="px-6 py-5 bg-gray-50 border-b border-gray-200"><h3 className="text-lg font-black text-gray-800">Livre d'Architecture du Trésor</h3></div>
                                    <div className="overflow-x-auto"><table className="min-w-full divide-y divide-gray-200"><thead className="bg-white"><tr><th className="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Date</th><th className="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Frère/Sœur</th><th className="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Mode</th><th className="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Montant</th><th className="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Actions</th></tr></thead><tbody className="bg-white divide-y divide-gray-100">{[...payments].sort((a, b) => new Date(b.date) - new Date(a.date)).map(payment => { const member = users.find(u => String(u.id) === String(payment.memberId)); const methodInfo = getMethodDisplay(payment.method); const MethodIcon = methodInfo.icon; return (<tr key={payment.id} className={`transition-colors ${editingPaymentId === payment.id ? 'bg-indigo-50' : 'hover:bg-gray-50'}`}><td className="px-6 py-5 whitespace-nowrap text-sm text-gray-600 font-medium">{new Date(payment.date).toLocaleDateString('fr-FR')}</td><td className="px-6 py-5 whitespace-nowrap text-sm font-bold text-gray-900">{member ? member.name : <span className="text-red-500 italic font-normal">Rayé du Tableau</span>}</td><td className="px-6 py-5 whitespace-nowrap text-sm text-gray-500 font-medium"><span className="flex items-center"><MethodIcon size={18} className="mr-2 text-indigo-800" />{methodInfo.label}</span></td><td className="px-6 py-5 whitespace-nowrap text-right text-base font-black text-gray-900">{parseFloat(payment.amount || 0).toFixed(2)} €</td><td className="px-6 py-5 whitespace-nowrap text-right text-sm font-medium"><button onClick={() => editPayment(payment)} className="p-2 text-gray-500 hover:text-indigo-900 hover:bg-indigo-50 rounded-lg transition-colors mr-2"><Edit2 size={18} /></button><button onClick={() => deletePayment(payment.id)} className="p-2 text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors"><Trash2 size={18} /></button></td></tr>); })}</tbody></table></div>
                                </div>
                            </div>
                        )}
                        {activeTab === 'members' && (
                            <div className="space-y-8 animate-fade">
                                <div className="bg-white shadow-md rounded-2xl p-6 md:p-8 border-t-8 border-gray-900">
                                    <h3 className="text-2xl font-black text-gray-900 mb-6 flex items-center"><UserPlus className="mr-3 text-gray-800" size={28} /> Intégrer un Frère/Sœur au Tableau</h3>
                                    <form onSubmit={handleAddMember} className="flex flex-col md:flex-row gap-4 items-end">
                                        <div className="flex-grow w-full"><label className="block text-sm font-bold text-gray-700 mb-2">Identité complète</label><input type="text" required value={newMemberName} onChange={e => setNewMemberName(e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded-xl py-3 px-4 focus:ring-2 focus:ring-gray-900 focus:border-gray-900 font-medium text-gray-900" placeholder="Ex: Jean Dupont" /></div>
                                        <button type="submit" disabled={members.length >= maxMembersLimit || isProcessing} className="w-full md:w-auto px-8 py-3 rounded-xl font-black text-white bg-gray-900 hover:bg-black disabled:opacity-50 transition-all flex items-center justify-center shadow-lg"><Key size={18} className="mr-2" /> Générer Code & Ajouter</button>
                                    </form>
                                </div>
                                <div className="bg-white shadow-sm border border-gray-200 rounded-2xl overflow-hidden">
                                    <div className="px-6 py-6 bg-gray-50 border-b border-gray-200 flex flex-col md:flex-row md:items-center justify-between gap-4">
                                        <div><h3 className="text-xl font-black text-gray-900">Tableau de Loge</h3><p className="text-sm text-gray-500 font-medium mt-1">Codes de sécurité à communiquer aux Frères/Sœurs.</p></div>
                                        <div className="relative w-full md:w-72"><div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Search className="h-5 w-5 text-gray-400" size={20} /></div><input type="text" className="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl bg-white focus:ring-2 focus:ring-indigo-900 font-medium text-sm" placeholder="Rechercher un Frère/Sœur ou code…" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} /></div>
                                    </div>
                                    <ul className="divide-y divide-gray-100">
                                        {filteredMembers.sort((a, b) => a.name.localeCompare(b.name)).map(member => {
                                            const memberPayments = payments.filter(p => String(p.memberId) === String(member.id)).sort((a, b) => new Date(a.date) - new Date(b.date));
                                            const memberTotal    = memberPayments.reduce((s, p) => s + parseFloat(p.amount || 0), 0);
                                            const status         = getMemberStatus(memberTotal);
                                            const isExpanded     = expandedMemberId === member.id;
                                            const isEditingThis  = editingMemberId === member.id;
                                            return (
                                                <li key={member.id} className="flex flex-col hover:bg-gray-50 transition-colors group">
                                                    <div className="p-6 flex flex-col md:flex-row md:items-center justify-between gap-4 md:gap-0">
                                                        <div className="flex flex-col w-full md:w-1/3">
                                                            {isEditingThis ? <input type="text" value={editMemberName} onChange={e => setEditMemberName(e.target.value)} className="w-full bg-white border border-indigo-400 rounded-lg py-2 px-3 focus:ring-2 focus:ring-indigo-900 font-black text-gray-900 text-lg shadow-sm" autoFocus /> : <div className="text-lg font-black text-gray-900">{member.name}</div>}
                                                            <div className="mt-2 inline-flex items-center w-max px-3 py-1.5 bg-indigo-50 text-indigo-900 border border-indigo-200 rounded-lg shadow-sm"><Lock size={14} className="mr-2 text-indigo-700" /><span className="text-xs font-bold uppercase tracking-wider mr-2 opacity-80">Accès</span><strong className="text-lg font-mono tracking-widest">{member.pin}</strong></div>
                                                        </div>
                                                        <div className="flex-1 flex flex-col items-start md:items-center mb-4 md:mb-0">
                                                            <span className={`inline-flex items-center px-4 py-1.5 rounded-full text-sm font-bold border ${status.color} shadow-sm`}><span className={`h-2.5 w-2.5 mr-2.5 rounded-full ${status.dot}`}></span>{status.label}</span>
                                                            <button onClick={() => setExpandedMemberId(isExpanded ? null : member.id)} className="mt-3 text-sm font-bold text-indigo-800 hover:text-indigo-950 flex items-center bg-indigo-50 px-3 py-1.5 rounded-lg transition-colors border border-indigo-200">{memberPayments.length} versement(s) consigné(s){isExpanded ? <ChevronUp size={16} className="ml-1" /> : <ChevronDown size={16} className="ml-1" />}</button>
                                                        </div>
                                                        <div className="flex items-center justify-between md:justify-end w-full md:w-1/3">
                                                            <div className="text-right mr-4"><div className="text-sm text-gray-500 font-medium">Capitation versée</div><div className="text-xl font-black text-gray-900">{memberTotal.toFixed(2)} €</div><div className="text-xs font-bold text-gray-400 mt-1 uppercase tracking-wider">Reste : {Math.max(0, CAPITATION_CIBLE - memberTotal).toFixed(2)} €</div></div>
                                                            {isEditingThis ? (<div className="flex space-x-1"><button onClick={() => handleUpdateMemberName(member.id)} className="p-2 text-white bg-green-600 hover:bg-green-700 rounded-xl transition-colors shadow-md"><Save size={20} /></button><button onClick={() => setEditingMemberId(null)} className="p-2 text-gray-600 bg-gray-200 hover:bg-gray-300 rounded-xl transition-colors shadow-sm"><XIcon size={20} /></button></div>) : (<div className="flex space-x-1 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity"><button onClick={() => { setEditingMemberId(member.id); setEditMemberName(member.name); }} className="p-2.5 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-colors"><Edit2 size={20} /></button><button onClick={() => deleteMember(member.id)} className="p-2.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-colors"><Trash2 size={20} /></button></div>)}
                                                        </div>
                                                    </div>
                                                    {isExpanded && (<div className="bg-indigo-50 border-t border-indigo-100 p-6 animate-fade"><h4 className="text-sm font-black text-indigo-900 uppercase tracking-wider mb-4 flex items-center"><Calendar size={16} className="mr-2" /> Historique détaillé de {member.name}</h4>{memberPayments.length > 0 ? (<div className="grid grid-cols-1 md:grid-cols-2 gap-3">{memberPayments.map((pay, idx) => (<div key={pay.id} className="bg-white border border-indigo-100 p-3 rounded-xl flex justify-between items-center shadow-sm"><div><div className="text-xs font-bold text-indigo-600 uppercase mb-1">Versement n°{idx + 1}</div><div className="text-sm font-bold text-gray-900">{new Date(pay.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })}</div><div className="text-xs text-gray-500 mt-0.5">{getMethodDisplay(pay.method).label}{pay.note ? ` – ${pay.note}` : ''}</div></div><div className="text-lg font-black text-indigo-900">{parseFloat(pay.amount || 0).toFixed(2)} €</div></div>))}</div>) : (<p className="text-sm text-gray-500 italic">Aucun versement consigné pour ce Frère/Sœur.</p>)}</div>)}
                                                </li>
                                            );
                                        })}
                                    </ul>
                                </div>
                            </div>
                        )}
                        <CustomModal isOpen={modalConfig.isOpen} type={modalConfig.type} title={modalConfig.title} message={modalConfig.message} onConfirm={modalConfig.onConfirm} onCancel={closeModal} />
                    </div>
                </div>
            );
        }

        function CustomModal({ isOpen, type, title, message, onConfirm, onCancel }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-indigo-950/70 px-4 backdrop-blur-sm">
                    <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8 transform transition-all border border-indigo-100">
                        <h3 className="text-2xl font-black text-indigo-950 mb-4">{title}</h3>
                        <p className="text-gray-700 mb-8 font-medium text-lg leading-snug">{message}</p>
                        <div className="flex justify-end space-x-4">
                            <button onClick={onCancel} className="px-6 py-3 rounded-xl font-bold text-gray-700 bg-gray-100 hover:bg-gray-200 transition-colors">{type === 'confirm' ? 'Annuler' : 'Fermer'}</button>
                            {type === 'confirm' && <button onClick={onConfirm} className="px-6 py-3 rounded-xl font-bold text-white bg-red-700 hover:bg-red-800 transition-colors shadow-lg shadow-red-200">Confirmer</button>}
                        </div>
                    </div>
                </div>
            );
        }

        function MemberDashboard({ user, payments, onLogout }) {
            const totalPaid   = payments.reduce((s, p) => s + parseFloat(p.amount || 0), 0);
            const resteAPayer = Math.max(0, CAPITATION_CIBLE - totalPaid);
            let headerColor = 'from-red-700 to-red-900';
            let statusText  = 'Aucun versement de capitation';
            if (totalPaid >= CAPITATION_CIBLE) { headerColor = 'from-green-600 to-green-800'; statusText = 'Capitation annuelle à jour'; }
            else if (totalPaid > 0)            { headerColor = 'from-yellow-600 to-yellow-700'; statusText = 'Règlement en cours'; }
            const getMethodDisplay = (methodId) => { const method = PAYMENT_METHODS.find(m => m.id === methodId); return method ? { label: method.label, icon: method.icon } : { label: 'Inconnu', icon: Euro }; };
            const sortedPayments = [...payments].sort((a, b) => new Date(a.date) - new Date(b.date)).map((p, i) => ({ ...p, chronologicalNumber: i + 1 })).sort((a, b) => new Date(b.date) - new Date(a.date));
            return (
                <div className="min-h-screen bg-gray-50 pb-12">
                    <nav className="bg-white shadow-sm border-b border-gray-200"><div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8"><div className="flex justify-between h-16"><div className="flex items-center text-indigo-950 font-black text-xl"><Users className="mr-3 text-indigo-800" size={24} /> Espace Personnel</div><div className="flex items-center"><button onClick={onLogout} className="text-gray-600 hover:text-indigo-950 px-3 py-2 rounded-lg flex items-center font-bold transition-colors bg-gray-100 hover:bg-gray-200"><LogOut size={16} className="mr-2" /> Quitter l'espace</button></div></div></div></nav>
                    <div className="max-w-4xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
                        <div className={`bg-gradient-to-br ${headerColor} shadow-xl shadow-gray-200/50 rounded-3xl p-8 mb-8 text-white flex flex-col md:flex-row items-center justify-between border border-white/10 relative overflow-hidden animate-fade`}>
                            <div className="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-white opacity-10 rounded-full blur-2xl"></div>
                            <div className="flex items-center mb-8 md:mb-0 w-full md:w-auto relative z-10">
                                <div className="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-white font-black text-2xl backdrop-blur-sm shadow-inner">{user.name.charAt(0)}</div>
                                <div className="ml-5"><h2 className="text-3xl font-black leading-tight drop-shadow-sm">{user.name}</h2><div className="inline-flex items-center mt-2 bg-black/20 px-4 py-1.5 rounded-full border border-white/20 backdrop-blur-sm shadow-sm"><Shield size={14} className="mr-2 opacity-80" /><span className="text-sm font-bold">{statusText}</span></div></div>
                            </div>
                            <div className="w-full md:w-auto flex flex-row gap-4 bg-black/20 p-5 rounded-2xl border border-white/20 backdrop-blur-sm relative z-10 shadow-inner">
                                <div className="text-center px-4"><p className="text-xs font-bold uppercase tracking-widest opacity-80 mb-2">Total versé</p><p className="text-4xl font-black drop-shadow-md">{totalPaid.toFixed(2)} <span className="text-2xl opacity-80">€</span></p><p className="text-xs font-bold mt-1 opacity-90 text-white bg-white/20 px-2 py-1 rounded-md inline-block">en {payments.length} versement(s)</p></div>
                                {resteAPayer > 0 && (<div className="text-center border-l border-white/20 pl-8 pr-4"><p className="text-xs font-bold uppercase tracking-widest opacity-80 mb-2">Reste dû</p><p className="text-4xl font-black text-yellow-200 drop-shadow-md">{resteAPayer.toFixed(2)} <span className="text-2xl opacity-80">€</span></p></div>)}
                            </div>
                        </div>
                        <div className="bg-white shadow-sm border border-gray-200 rounded-3xl overflow-hidden animate-fade">
                            <div className="px-8 py-6 bg-white border-b border-gray-100 flex items-center justify-between"><h3 className="text-xl font-black text-indigo-950 flex items-center"><Calendar className="mr-3 text-indigo-700" size={24} /> Historique de vos capitations</h3><span className="bg-gray-100 text-gray-600 text-xs font-bold px-3 py-1 rounded-lg uppercase tracking-wider">Lecture seule</span></div>
                            <ul className="divide-y divide-gray-100">
                                {sortedPayments.map(payment => { const methodInfo = getMethodDisplay(payment.method); const MethodIcon = methodInfo.icon; return (<li key={payment.id} className="px-8 py-6 flex flex-col sm:flex-row sm:items-center justify-between hover:bg-indigo-50/30 transition-colors"><div className="flex items-center mb-4 sm:mb-0"><div className="flex-shrink-0 h-14 w-14 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-800 border border-indigo-100 relative"><span className="absolute -top-2 -right-2 bg-indigo-800 text-white font-black text-xs w-6 h-6 rounded-full flex items-center justify-center shadow-sm border-2 border-white">{payment.chronologicalNumber}</span><MethodIcon size={24} /></div><div className="ml-5"><p className="text-xs font-black text-indigo-600 uppercase tracking-widest mb-1">Versement n°{payment.chronologicalNumber}</p><p className="text-lg font-black text-gray-900">{payment.note || 'Versement régulier'}</p><p className="text-sm font-medium text-gray-500 mt-1">Consigné le {new Date(payment.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })}</p><span className="text-xs text-indigo-700 mt-1.5 font-bold uppercase tracking-wider inline-flex items-center bg-indigo-100 px-2 py-0.5 rounded-md">Via {methodInfo.label}</span></div></div><div className="text-2xl font-black text-gray-900 text-right bg-gray-50 px-5 py-3 rounded-xl border border-gray-200">+ {parseFloat(payment.amount || 0).toFixed(2)} €</div></li>); })}
                                {payments.length === 0 && (<li className="px-8 py-16 text-center"><div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gray-50 mb-6 border border-gray-200 shadow-inner"><Banknote size={40} className="text-gray-300" /></div><p className="text-gray-900 text-xl font-black mb-2">Aucun règlement consigné</p><p className="text-gray-600 font-medium">Votre retard de capitation envers la Loge s'élève à {CAPITATION_CIBLE.toFixed(2)} €.</p><p className="text-gray-500 text-sm mt-4 italic">En cas d'erreur ou d'omission, veuillez vous rapprocher du Frère Trésorier.</p></li>)}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
