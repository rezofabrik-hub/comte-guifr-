<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trésorerie — Votre Loge</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Square_Compass.svg/512px-Square_Compass.svg.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin:0; padding:0; }
        .font-serif { font-family: 'Cinzel', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root">
        <div id="loading-screen" style="display:flex;justify-content:center;align-items:center;height:100vh;background-color:#0f172a;color:#f59e0b;font-family:'Cinzel',serif;flex-direction:column;text-align:center;padding:20px;">
            <div style="font-size:1.5rem;text-transform:uppercase;letter-spacing:0.2em;margin-bottom:1rem;">Ouverture du Trésor...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, setDoc, query, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        if (!window.FB_API) {
            const firebaseConfig = {
                apiKey: "AIzaSyA4IGmEv_bPt4Q5dnxjT2FIySP3JvAhQ20",
                authDomain: "site-cg51.firebaseapp.com",
                projectId: "site-cg51",
                storageBucket: "site-cg51.firebasestorage.app",
                messagingSenderId: "532992433947",
                appId: "1:532992433947:web:0ad401c53e6feeb0663dbe"
            };
            try {
                const app = initializeApp(firebaseConfig);
                window.FB_API = {
                    db: getFirestore(app), auth: getAuth(app),
                    collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, setDoc, query, getDocs, writeBatch,
                    signInAnonymously, onAuthStateChanged,
                    appId: "site-cg51"
                };
            } catch(e) { console.error("Firebase fail", e); }
        }
    </script>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo, useCallback } = React;

        const CATEGORIES_RECETTE = ['Cotisation annuelle', 'Don / Collecte', 'Agapes', 'Subvention', 'Remboursement', 'Autre recette'];
        const CATEGORIES_DEPENSE = ['Loyer / Local', 'Fournitures', 'Agapes', 'Événement', 'Correspondance', 'Assurance', 'Autre dépense'];

        const fmt = (n) => new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(n || 0);

        const SmartIcon = ({ name, size = 18, className = "" }) => {
            const iconMap = {
                'Landmark': 'fa-solid fa-landmark', 'AlertTriangle': 'fa-solid fa-triangle-exclamation',
                'LogOut': 'fa-solid fa-right-from-bracket', 'Plus': 'fa-solid fa-plus',
                'Trash2': 'fa-regular fa-trash-can', 'Edit2': 'fa-solid fa-pen',
                'X': 'fa-solid fa-xmark', 'ChevronDown': 'fa-solid fa-chevron-down',
                'TrendingUp': 'fa-solid fa-arrow-trend-up', 'TrendingDown': 'fa-solid fa-arrow-trend-down',
                'Wallet': 'fa-solid fa-wallet', 'Users': 'fa-solid fa-users',
                'Check': 'fa-solid fa-check', 'Clock': 'fa-regular fa-clock',
                'Calendar': 'fa-regular fa-calendar-days', 'Filter': 'fa-solid fa-filter',
                'Download': 'fa-solid fa-download', 'FileText': 'fa-regular fa-file-lines',
                'BarChart': 'fa-solid fa-chart-bar', 'Home': 'fa-solid fa-house',
                'ChevronLeft': 'fa-solid fa-chevron-left', 'Euro': 'fa-solid fa-euro-sign',
            };
            return <i className={`${iconMap[name] || 'fa-solid fa-circle-info'} ${className}`} style={{fontSize: size}}></i>;
        };

        // ==============================
        // DASHBOARD (BILAN)
        // ==============================
        function DashboardView({ transactions, cotisations, members, onNav }) {
            const thisYear = new Date().getFullYear();
            const recettes = transactions.filter(t => t.type === 'recette');
            const depenses = transactions.filter(t => t.type === 'depense');
            const totalRecettes = recettes.reduce((s, t) => s + (t.montant || 0), 0);
            const totalDepenses = depenses.reduce((s, t) => s + (t.montant || 0), 0);
            const solde = totalRecettes - totalDepenses;

            const cotisationsAnnee = cotisations.filter(c => c.annee == thisYear);
            const payees = cotisationsAnnee.filter(c => c.payee).length;
            const totalMembres = members.length;

            const recentes = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 5);

            return (
                <div className="space-y-8 animate-fade">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div className={`p-6 rounded-2xl border-2 shadow-sm flex flex-col ${solde >= 0 ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'}`}>
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-3 font-sans">Solde Actuel</p>
                            <p className={`text-4xl font-bold font-serif ${solde >= 0 ? 'text-emerald-700' : 'text-red-700'}`}>{fmt(solde)}</p>
                            <p className="text-xs text-slate-400 mt-auto pt-3 font-sans">Toutes périodes confondues</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border shadow-sm flex flex-col">
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-3 font-sans flex items-center"><SmartIcon name="TrendingUp" size={14} className="mr-2 text-emerald-500"/>Recettes Totales</p>
                            <p className="text-3xl font-bold font-serif text-emerald-600">{fmt(totalRecettes)}</p>
                            <p className="text-xs text-slate-400 mt-auto pt-3 font-sans">{recettes.length} opération{recettes.length > 1 ? 's' : ''}</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border shadow-sm flex flex-col">
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-3 font-sans flex items-center"><SmartIcon name="TrendingDown" size={14} className="mr-2 text-red-500"/>Dépenses Totales</p>
                            <p className="text-3xl font-bold font-serif text-red-500">{fmt(totalDepenses)}</p>
                            <p className="text-xs text-slate-400 mt-auto pt-3 font-sans">{depenses.length} opération{depenses.length > 1 ? 's' : ''}</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border shadow-sm flex flex-col cursor-pointer hover:border-amber-400 transition-all" onClick={() => onNav('cotisations')}>
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-3 font-sans flex items-center"><SmartIcon name="Users" size={14} className="mr-2 text-amber-600"/>Cotisations {thisYear}</p>
                            <p className="text-3xl font-bold font-serif text-amber-600">{payees} / {totalMembres || '—'}</p>
                            <div className="mt-3 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                <div className="h-full bg-amber-500 rounded-full transition-all" style={{width: totalMembres ? `${(payees/totalMembres)*100}%` : '0%'}}></div>
                            </div>
                            <p className="text-xs text-slate-400 mt-2 font-sans">Membres à jour</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="bg-white p-8 rounded-2xl border shadow-sm">
                            <h3 className="font-bold text-amber-800 mb-6 flex items-center uppercase tracking-widest text-xs font-serif border-b pb-4">
                                <SmartIcon name="Calendar" className="mr-3" size={18}/> Dernières Opérations
                            </h3>
                            {recentes.length === 0 ? (
                                <p className="text-slate-400 italic text-center py-8 font-sans">Aucune opération enregistrée.</p>
                            ) : (
                                <div className="space-y-3">
                                    {recentes.map(t => (
                                        <div key={t.id} className="flex items-center justify-between py-3 border-b border-slate-50 last:border-0">
                                            <div className="flex items-center gap-3">
                                                <div className={`w-2 h-8 rounded-full flex-shrink-0 ${t.type === 'recette' ? 'bg-emerald-400' : 'bg-red-400'}`}></div>
                                                <div>
                                                    <p className="font-bold text-sm text-slate-800">{t.libelle}</p>
                                                    <p className="text-[10px] text-slate-400 font-sans uppercase tracking-widest">{t.categorie} · {new Date(t.date).toLocaleDateString('fr-FR')}</p>
                                                </div>
                                            </div>
                                            <span className={`font-bold font-serif text-sm ${t.type === 'recette' ? 'text-emerald-600' : 'text-red-500'}`}>{t.type === 'recette' ? '+' : '-'}{fmt(t.montant)}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                            <button onClick={() => onNav('transactions')} className="mt-6 w-full text-center text-amber-600 hover:text-amber-800 text-[10px] font-bold uppercase tracking-widest font-sans">Voir toutes les opérations →</button>
                        </div>

                        <div className="bg-white p-8 rounded-2xl border shadow-sm">
                            <h3 className="font-bold text-amber-800 mb-6 flex items-center uppercase tracking-widest text-xs font-serif border-b pb-4">
                                <SmartIcon name="BarChart" className="mr-3" size={18}/> Répartition par Catégorie
                            </h3>
                            {transactions.length === 0 ? (
                                <p className="text-slate-400 italic text-center py-8 font-sans">Aucune donnée disponible.</p>
                            ) : (
                                <div className="space-y-3">
                                    {Object.entries(
                                        [...CATEGORIES_RECETTE, ...CATEGORIES_DEPENSE].reduce((acc, cat) => {
                                            const txCat = transactions.filter(t => t.categorie === cat);
                                            if (txCat.length === 0) return acc;
                                            const total = txCat.reduce((s, t) => s + (t.montant||0), 0);
                                            const isRecette = CATEGORIES_RECETTE.includes(cat);
                                            acc[cat] = { total, isRecette, count: txCat.length };
                                            return acc;
                                        }, {})
                                    ).sort((a,b) => b[1].total - a[1].total).slice(0,6).map(([cat, data]) => (
                                        <div key={cat} className="flex items-center justify-between gap-4">
                                            <div className="flex items-center gap-2 flex-1 min-w-0">
                                                <span className={`w-2 h-2 rounded-full flex-shrink-0 ${data.isRecette ? 'bg-emerald-400' : 'bg-red-400'}`}></span>
                                                <span className="text-xs font-medium text-slate-700 truncate">{cat}</span>
                                            </div>
                                            <span className={`text-xs font-bold font-serif flex-shrink-0 ${data.isRecette ? 'text-emerald-600' : 'text-red-500'}`}>{fmt(data.total)}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==============================
        // TRANSACTIONS
        // ==============================
        function TransactionForm({ initialData, onSave, onCancel }) {
            const [f, setF] = useState(initialData || {
                date: new Date().toISOString().split('T')[0],
                type: 'recette', libelle: '', categorie: 'Cotisation annuelle', montant: '', note: ''
            });
            const cats = f.type === 'recette' ? CATEGORIES_RECETTE : CATEGORIES_DEPENSE;

            useEffect(() => {
                if (!cats.includes(f.categorie)) setF(prev => ({ ...prev, categorie: cats[0] }));
            }, [f.type]);

            return (
                <form onSubmit={async e => { e.preventDefault(); await onSave({ ...f, montant: parseFloat(f.montant) || 0 }); }} className="space-y-5 font-sans animate-fade">
                    <div className="flex bg-slate-100 p-1 rounded-xl">
                        <button type="button" onClick={() => setF({ ...f, type: 'recette' })} className={`flex-1 py-2.5 rounded-lg text-xs font-bold uppercase transition-all ${f.type==='recette'?'bg-emerald-600 text-white shadow':'text-slate-500'}`}>+ Recette</button>
                        <button type="button" onClick={() => setF({ ...f, type: 'depense' })} className={`flex-1 py-2.5 rounded-lg text-xs font-bold uppercase transition-all ${f.type==='depense'?'bg-red-500 text-white shadow':'text-slate-500'}`}>− Dépense</button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Date</label><input type="date" value={f.date} onChange={e => setF({...f, date: e.target.value})} className="w-full border p-3 rounded-xl bg-slate-50 font-serif font-bold outline-none focus:border-amber-500" required /></div>
                        <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Montant (€)</label><input type="number" step="0.01" min="0" placeholder="0,00" value={f.montant} onChange={e => setF({...f, montant: e.target.value})} className="w-full border p-3 rounded-xl bg-slate-50 font-serif font-bold outline-none focus:border-amber-500" required /></div>
                    </div>
                    <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Libellé</label><input type="text" placeholder="Description de l'opération..." value={f.libelle} onChange={e => setF({...f, libelle: e.target.value})} className="w-full border p-3 rounded-xl bg-slate-50 font-bold outline-none focus:border-amber-500" required /></div>
                    <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Catégorie</label>
                        <select value={f.categorie} onChange={e => setF({...f, categorie: e.target.value})} className="w-full border p-3 rounded-xl bg-slate-50 font-bold outline-none focus:border-amber-500">
                            {cats.map(c => <option key={c}>{c}</option>)}
                        </select>
                    </div>
                    <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Note (optionnel)</label><textarea value={f.note} onChange={e => setF({...f, note: e.target.value})} placeholder="Commentaire..." className="w-full border p-3 rounded-xl bg-slate-50 h-20 outline-none focus:border-amber-500 text-sm resize-none"></textarea></div>
                    <div className="flex justify-end gap-4 pt-2">
                        <button type="button" onClick={onCancel} className="text-slate-400 font-bold text-xs uppercase tracking-widest">Annuler</button>
                        <button type="submit" className={`px-10 py-3 rounded-xl font-bold text-white shadow-lg text-xs uppercase tracking-widest font-serif ${f.type==='recette'?'bg-emerald-600 hover:bg-emerald-700':'bg-red-500 hover:bg-red-600'}`}>Enregistrer</button>
                    </div>
                </form>
            );
        }

        function TransactionsView({ transactions, canEdit, onAdd, onUpdate, onDelete }) {
            const [isAdding, setIsAdding] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [filterType, setFilterType] = useState('all');
            const [filterYear, setFilterYear] = useState(String(new Date().getFullYear()));

            const years = useMemo(() => {
                const ys = new Set(transactions.map(t => t.date?.split('-')[0]).filter(Boolean));
                return [...ys].sort((a,b) => b-a);
            }, [transactions]);

            const filtered = useMemo(() => {
                return transactions.filter(t => {
                    if (filterType !== 'all' && t.type !== filterType) return false;
                    if (filterYear !== 'all' && t.date?.split('-')[0] !== filterYear) return false;
                    return true;
                }).sort((a,b) => new Date(b.date) - new Date(a.date));
            }, [transactions, filterType, filterYear]);

            const totalFiltered = filtered.reduce((s, t) => t.type === 'recette' ? s + (t.montant||0) : s - (t.montant||0), 0);

            return (
                <div className="space-y-6 animate-fade">
                    <div className="bg-white p-6 rounded-2xl border flex flex-col md:flex-row justify-between items-center gap-4 shadow-sm">
                        <h2 className="text-2xl font-bold font-serif text-slate-800">Livre de Caisse</h2>
                        <div className="flex flex-wrap gap-2">
                            <div className="flex bg-slate-100 p-1 rounded-xl">
                                {[['all','Tout'],['recette','Recettes'],['depense','Dépenses']].map(([v,l]) => (
                                    <button key={v} onClick={() => setFilterType(v)} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all ${filterType===v?'bg-white text-amber-600 shadow':'text-slate-500'}`}>{l}</button>
                                ))}
                            </div>
                            <select value={filterYear} onChange={e => setFilterYear(e.target.value)} className="border bg-slate-50 px-3 py-1.5 rounded-xl text-xs font-bold outline-none focus:border-amber-500">
                                <option value="all">Toutes années</option>
                                {years.map(y => <option key={y}>{y}</option>)}
                            </select>
                            {canEdit && <button onClick={() => { setIsAdding(!isAdding); setEditingId(null); }} className="bg-amber-600 text-white px-5 py-2 rounded-xl text-xs font-bold uppercase shadow-md font-serif flex items-center gap-2"><SmartIcon name={isAdding?'X':'Plus'} size={16}/> Opération</button>}
                        </div>
                    </div>

                    {isAdding && (
                        <div className="bg-white p-8 rounded-2xl border shadow-xl">
                            <TransactionForm onSave={async d => { await onAdd(d); setIsAdding(false); }} onCancel={() => setIsAdding(false)} />
                        </div>
                    )}

                    <div className="bg-white rounded-2xl border shadow-sm overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b flex justify-between items-center">
                            <span className="text-xs font-bold text-slate-500 uppercase tracking-widest font-sans">{filtered.length} opération{filtered.length > 1 ? 's' : ''}</span>
                            <span className={`font-bold font-serif text-sm ${totalFiltered >= 0 ? 'text-emerald-600' : 'text-red-500'}`}>Solde filtré : {fmt(totalFiltered)}</span>
                        </div>
                        {filtered.length === 0 ? (
                            <p className="text-center py-16 text-slate-400 italic font-sans">Aucune opération pour cette sélection.</p>
                        ) : (
                            <div className="divide-y divide-slate-50">
                                {filtered.map(t => (
                                    editingId === t.id ? (
                                        <div key={t.id} className="p-6">
                                            <TransactionForm initialData={t} onSave={async d => { await onUpdate(t.id, d); setEditingId(null); }} onCancel={() => setEditingId(null)} />
                                        </div>
                                    ) : (
                                        <div key={t.id} className="flex items-center justify-between px-6 py-4 hover:bg-slate-50 transition-colors group">
                                            <div className="flex items-center gap-4">
                                                <div className={`w-1.5 h-10 rounded-full flex-shrink-0 ${t.type==='recette'?'bg-emerald-400':'bg-red-400'}`}></div>
                                                <div>
                                                    <p className="font-bold text-slate-800 text-sm">{t.libelle}</p>
                                                    <p className="text-[10px] text-slate-400 uppercase tracking-widest font-sans">{t.categorie} · {new Date(t.date).toLocaleDateString('fr-FR')}</p>
                                                    {t.note && <p className="text-[10px] text-slate-400 italic mt-0.5">{t.note}</p>}
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <span className={`font-bold font-serif text-base ${t.type==='recette'?'text-emerald-600':'text-red-500'}`}>{t.type==='recette'?'+':'-'}{fmt(t.montant)}</span>
                                                {canEdit && (
                                                    <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => setEditingId(t.id)} className="p-1.5 text-slate-300 hover:text-amber-600"><SmartIcon name="Edit2" size={14}/></button>
                                                        <button onClick={() => onDelete(t.id)} className="p-1.5 text-slate-300 hover:text-red-500"><SmartIcon name="Trash2" size={14}/></button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==============================
        // COTISATIONS
        // ==============================
        function CotisationsView({ members, cotisations, canEdit, onToggle, onAdd, onDelete }) {
            const [annee, setAnnee] = useState(String(new Date().getFullYear()));
            const [addingAnnee, setAddingAnnee] = useState('');
            const years = useMemo(() => {
                const ys = new Set(cotisations.map(c => String(c.annee)));
                ys.add(String(new Date().getFullYear()));
                return [...ys].sort((a,b) => b-a);
            }, [cotisations]);

            const memberCotis = useMemo(() => {
                return members.map(m => {
                    const cot = cotisations.find(c => c.membreId === m.id && String(c.annee) === annee);
                    return { member: m, cotisation: cot };
                });
            }, [members, cotisations, annee]);

            const payees = memberCotis.filter(mc => mc.cotisation?.payee).length;
            const montantAnnuel = cotisations.filter(c => String(c.annee) === annee && c.payee).reduce((s, c) => s + (c.montant || 0), 0);

            return (
                <div className="space-y-6 animate-fade">
                    <div className="bg-white p-6 rounded-2xl border flex flex-col md:flex-row justify-between items-center gap-4 shadow-sm">
                        <div>
                            <h2 className="text-2xl font-bold font-serif text-slate-800">Cotisations</h2>
                            <p className="text-slate-500 text-sm font-sans mt-1">Suivi des cotisations annuelles des Frères et Sœurs</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <select value={annee} onChange={e => setAnnee(e.target.value)} className="border bg-slate-50 px-4 py-2.5 rounded-xl text-sm font-bold outline-none focus:border-amber-500">
                                {years.map(y => <option key={y}>{y}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div className="bg-white p-5 rounded-2xl border shadow-sm text-center">
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 font-sans">Membres à jour</p>
                            <p className="text-3xl font-bold font-serif text-emerald-600">{payees} <span className="text-slate-300 text-2xl">/</span> {members.length}</p>
                        </div>
                        <div className="bg-white p-5 rounded-2xl border shadow-sm text-center">
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 font-sans">En attente</p>
                            <p className="text-3xl font-bold font-serif text-amber-600">{members.length - payees}</p>
                        </div>
                        <div className="bg-white p-5 rounded-2xl border shadow-sm text-center">
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 font-sans">Montant reçu {annee}</p>
                            <p className="text-3xl font-bold font-serif text-emerald-600">{fmt(montantAnnuel)}</p>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl border shadow-sm overflow-hidden">
                        <div className="grid grid-cols-1 divide-y divide-slate-50">
                            {memberCotis.length === 0 ? (
                                <p className="text-center py-16 text-slate-400 italic font-sans">Aucun membre dans le tableau de loge.</p>
                            ) : memberCotis.map(({ member, cotisation }) => (
                                <div key={member.id} className="flex items-center justify-between px-6 py-4 hover:bg-slate-50 transition-colors">
                                    <div>
                                        <p className="font-bold text-slate-800 text-sm">{member.name}</p>
                                        <p className="text-[10px] text-amber-700 uppercase font-bold tracking-widest font-sans">{member.role}</p>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        {cotisation && cotisation.payee && cotisation.montant && (
                                            <span className="text-xs text-emerald-600 font-bold font-serif">{fmt(cotisation.montant)}</span>
                                        )}
                                        {cotisation && cotisation.datePaiement && (
                                            <span className="text-[10px] text-slate-400 font-sans hidden md:block">{new Date(cotisation.datePaiement).toLocaleDateString('fr-FR')}</span>
                                        )}
                                        {canEdit ? (
                                            <button
                                                onClick={() => onToggle(member.id, annee, cotisation)}
                                                className={`flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all shadow-sm ${cotisation?.payee ? 'bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-red-50 hover:text-red-600 hover:border-red-200' : 'bg-amber-50 text-amber-700 border border-amber-200 hover:bg-emerald-50 hover:text-emerald-700 hover:border-emerald-200'}`}
                                            >
                                                <SmartIcon name={cotisation?.payee ? 'Check' : 'Clock'} size={12} />
                                                {cotisation?.payee ? 'À jour' : 'En attente'}
                                            </button>
                                        ) : (
                                            <span className={`flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest ${cotisation?.payee ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-slate-50 text-slate-400 border border-slate-200'}`}>
                                                <SmartIcon name={cotisation?.payee ? 'Check' : 'Clock'} size={12} />
                                                {cotisation?.payee ? 'À jour' : 'En attente'}
                                            </span>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {canEdit && (
                        <div className="bg-amber-50 p-6 rounded-2xl border border-amber-200">
                            <p className="text-xs font-bold text-amber-800 uppercase tracking-widest mb-1 font-sans">Montant de cotisation standard</p>
                            <p className="text-slate-600 text-sm font-sans">Cliquez sur le statut d'un membre pour basculer entre "Payé" et "En attente". Le montant et la date de paiement sont enregistrés automatiquement à la date du jour.</p>
                        </div>
                    )}
                </div>
            );
        }

        // ==============================
        // MODAL COTISATION (toggle)
        // ==============================
        function CotisationPayModal({ member, annee, onConfirm, onCancel }) {
            const [montant, setMontant] = useState('');
            const [note, setNote] = useState('');
            return (
                <div className="fixed inset-0 bg-slate-900/80 z-[200] flex items-center justify-center p-4 animate-fade">
                    <div className="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl">
                        <h2 className="text-xl font-serif font-bold mb-1">Marquer comme payé</h2>
                        <p className="text-slate-500 text-sm mb-6 font-sans">{member.name} — Cotisation {annee}</p>
                        <div className="space-y-4">
                            <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5 font-sans">Montant reçu (€)</label><input type="number" step="0.01" min="0" autoFocus placeholder="ex: 100" value={montant} onChange={e => setMontant(e.target.value)} className="w-full border-2 p-3 rounded-xl text-base font-bold outline-none focus:border-emerald-500" /></div>
                            <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5 font-sans">Note (optionnel)</label><input type="text" placeholder="Chèque n°, virement..." value={note} onChange={e => setNote(e.target.value)} className="w-full border p-3 rounded-xl text-sm outline-none focus:border-emerald-500" /></div>
                        </div>
                        <div className="flex gap-3 mt-6">
                            <button onClick={onCancel} className="flex-1 text-slate-400 font-bold text-xs uppercase py-3 border rounded-xl font-sans">Annuler</button>
                            <button onClick={() => onConfirm(parseFloat(montant)||0, note)} className="flex-1 bg-emerald-600 text-white font-bold text-xs uppercase py-3 rounded-xl shadow-md font-serif">Confirmer</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==============================
        // APP
        // ==============================
        function App() {
            const api = window.FB_API;
            const [ready, setReady] = useState(false);
            const [activeView, setActiveView] = useState('dashboard');
            const [transactions, setTransactions] = useState([]);
            const [cotisations, setCotisations] = useState([]);
            const [members, setMembers] = useState([]);
            const [logo, setLogo] = useState(null);
            const [payModal, setPayModal] = useState(null);

            useEffect(() => {
                if (!api) return;
                api.signInAnonymously(api.auth).then(() => setReady(true)).catch(console.error);
            }, [api]);

            useEffect(() => {
                if (!api || !ready) return;
                const path = (c) => api.collection(api.db, 'artifacts', api.appId, 'public', 'data', c);
                const unsubTx = api.onSnapshot(path('tresor_transactions'), s => setTransactions(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubCot = api.onSnapshot(path('tresor_cotisations'), s => setCotisations(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                return () => { unsubTx(); unsubCot(); };
            }, [api, ready]);

            const canEdit = true;

            const addTransaction = async (d) => {
                await api.addDoc(api.collection(api.db, 'artifacts', api.appId, 'public', 'data', 'tresor_transactions'), d);
            };
            const updateTransaction = async (id, d) => {
                await api.updateDoc(api.doc(api.db, 'artifacts', api.appId, 'public', 'data', 'tresor_transactions', id), d);
            };
            const deleteTransaction = async (id) => {
                await api.deleteDoc(api.doc(api.db, 'artifacts', api.appId, 'public', 'data', 'tresor_transactions', id));
            };

            const toggleCotisation = async (membreId, annee, existing) => {
                if (existing?.payee) {
                    await api.updateDoc(api.doc(api.db, 'artifacts', api.appId, 'public', 'data', 'tresor_cotisations', existing.id), { payee: false, datePaiement: null, montant: 0 });
                } else {
                    setPayModal({ membreId, annee, existingId: existing?.id });
                }
            };

            const confirmPay = async (montant, note) => {
                const { membreId, annee, existingId } = payModal;
                const data = { membreId, annee: parseInt(annee), payee: true, datePaiement: new Date().toISOString().split('T')[0], montant, note };
                if (existingId) {
                    await api.updateDoc(api.doc(api.db, 'artifacts', api.appId, 'public', 'data', 'tresor_cotisations', existingId), data);
                } else {
                    await api.addDoc(api.collection(api.db, 'artifacts', api.appId, 'public', 'data', 'tresor_cotisations'), data);
                }
                setPayModal(null);
            };

            if (!ready) return null;
            const loader = document.getElementById('loading-screen');
            if (loader) loader.style.display = 'none';

            const payMember = payModal ? members.find(m => m.id === payModal.membreId) : null;

            const navItems = [
                { id: 'dashboard', icon: 'Home', label: 'Bilan' },
                { id: 'transactions', icon: 'FileText', label: 'Livre de caisse' },
                { id: 'cotisations', icon: 'Users', label: 'Cotisations' },
            ];

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    <nav className="bg-slate-900 text-white shadow-xl sticky top-0 z-50 p-3">
                        <div className="max-w-7xl mx-auto flex justify-between items-center gap-4">
                            <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setActiveView('dashboard')}>
                                {logo ? <img src={logo} className="w-10 h-10 object-contain" /> : <SmartIcon name="Wallet" size={24} className="text-amber-500"/>}
                                <div className="hidden md:block">
                                    <span className="text-base font-bold font-serif text-white tracking-widest uppercase">Trésorerie</span>
                                    <span className="block text-[9px] text-slate-400 font-sans uppercase tracking-widest">Votre Loge</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 font-serif text-[10px]">
                                {navItems.map(item => (
                                    <button key={item.id} onClick={() => setActiveView(item.id)} className={`flex items-center space-x-1.5 px-3 py-2 rounded-xl text-[10px] font-bold uppercase transition-all font-serif ${activeView===item.id ? 'bg-amber-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800 hover:text-amber-300'}`}>
                                        <SmartIcon name={item.icon} size={14}/>
                                        <span className="hidden sm:inline font-sans">{item.label}</span>
                                    </button>
                                ))}
                                <div className="w-px h-6 bg-slate-700 mx-1"></div>
                                <a href="index.html" className="p-2 text-slate-400 hover:text-amber-400 transition-colors" title="Retour au Temple"><SmartIcon name="Landmark" size={18}/></a>
                            </div>
                        </div>
                    </nav>

                    {payModal && payMember && (
                        <CotisationPayModal member={payMember} annee={payModal.annee} onConfirm={confirmPay} onCancel={() => setPayModal(null)} />
                    )}

                    <main className="max-w-7xl mx-auto px-4 py-8 flex-grow w-full">
                        {activeView === 'dashboard' && <DashboardView transactions={transactions} cotisations={cotisations} members={members} onNav={setActiveView} />}
                        {activeView === 'transactions' && <TransactionsView transactions={transactions} canEdit={canEdit} onAdd={addTransaction} onUpdate={updateTransaction} onDelete={deleteTransaction} />}
                        {activeView === 'cotisations' && <CotisationsView members={members} cotisations={cotisations} canEdit={canEdit} onToggle={toggleCotisation} />}
                    </main>

                    <footer className="py-8 text-center text-slate-400 text-[10px] uppercase font-bold tracking-[0.2em] border-t bg-white font-serif">Votre Loge — Orient — Trésorerie</footer>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        if (rootElement && !rootElement._reactRoot) {
            const root = ReactDOM.createRoot(rootElement);
            rootElement._reactRoot = root;
            root.render(<App />);
        }
    </script>
</body>
</html>
