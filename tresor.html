<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trésorerie</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Square_Compass.svg/512px-Square_Compass.svg.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin:0; padding:0; }
        .font-serif { font-family: 'Cinzel', serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root">
        <div id="loading-screen" style="display:flex;justify-content:center;align-items:center;height:100vh;background-color:#0f172a;color:#f59e0b;font-family:'Cinzel',serif;flex-direction:column;text-align:center;padding:20px;">
            <div style="font-size:1.5rem;text-transform:uppercase;letter-spacing:0.2em;margin-bottom:1rem;">Ouverture du Trésor...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        if (!window.FB_API) {
            const firebaseConfig = {
                apiKey: "AIzaSyA4IGmEv_bPt4Q5dnxjT2FIySP3JvAhQ20",
                authDomain: "site-cg51.firebaseapp.com",
                projectId: "site-cg51",
                storageBucket: "site-cg51.firebasestorage.app",
                messagingSenderId: "532992433947",
                appId: "1:532992433947:web:0ad401c53e6feeb0663dbe"
            };
            try {
                const app = initializeApp(firebaseConfig);
                window.FB_API = {
                    db: getFirestore(app), auth: getAuth(app),
                    collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, setDoc, getDoc,
                    signInAnonymously,
                    appId: "site-cg51"
                };
            } catch(e) { console.error("Firebase fail", e); }
        }
    </script>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo } = React;

        const CATEGORIES_RECETTE = ['Cotisation annuelle', 'Don / Collecte', 'Agapes', 'Subvention', 'Remboursement', 'Autre recette'];
        const CATEGORIES_DEPENSE = ['Loyer / Local', 'Fournitures', 'Agapes', 'Événement', 'Correspondance', 'Assurance', 'Autre dépense'];

        const fmt = (n) => new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(n || 0);

        const Icon = ({ n, size = 18, cls = "" }) => {
            const m = {
                home: 'fa-solid fa-house', wallet: 'fa-solid fa-wallet', users: 'fa-solid fa-users',
                settings: 'fa-solid fa-gear', plus: 'fa-solid fa-plus', trash: 'fa-regular fa-trash-can',
                edit: 'fa-solid fa-pen', x: 'fa-solid fa-xmark', check: 'fa-solid fa-check',
                clock: 'fa-regular fa-clock', up: 'fa-solid fa-arrow-trend-up', down: 'fa-solid fa-arrow-trend-down',
                file: 'fa-regular fa-file-lines', chart: 'fa-solid fa-chart-bar', cal: 'fa-regular fa-calendar-days',
                landmark: 'fa-solid fa-landmark', shield: 'fa-solid fa-shield-halved',
            };
            return <i className={`${m[n] || 'fa-solid fa-circle'} ${cls}`} style={{fontSize: size}}></i>;
        };

        // ==============================
        // BILAN
        // ==============================
        function DashboardView({ transactions, cotisations, membres, settings, onNav }) {
            const thisYear = new Date().getFullYear();
            const recettes = transactions.filter(t => t.type === 'recette');
            const depenses = transactions.filter(t => t.type === 'depense');
            const totalR = recettes.reduce((s, t) => s + (t.montant || 0), 0);
            const totalD = depenses.reduce((s, t) => s + (t.montant || 0), 0);
            const solde = totalR - totalD;
            const membresAyantVerse = new Set(cotisations.filter(c=>c.annee==thisYear).map(c=>c.membreId)).size;
            const payees = membresAyantVerse;
            const recentes = [...transactions].sort((a,b) => new Date(b.date)-new Date(a.date)).slice(0,5);

            return (
                <div className="space-y-8 animate-fade">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div className={`p-6 rounded-2xl border-2 shadow-sm flex flex-col ${solde>=0?'bg-emerald-50 border-emerald-200':'bg-red-50 border-red-200'}`}>
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-3 font-sans">Solde Actuel</p>
                            <p className={`text-4xl font-bold font-serif ${solde>=0?'text-emerald-700':'text-red-700'}`}>{fmt(solde)}</p>
                            <p className="text-xs text-slate-400 mt-auto pt-3 font-sans">Toutes périodes confondues</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border shadow-sm flex flex-col">
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-3 font-sans flex items-center"><Icon n="up" size={14} cls="mr-2 text-emerald-500"/>Recettes Totales</p>
                            <p className="text-3xl font-bold font-serif text-emerald-600">{fmt(totalR)}</p>
                            <p className="text-xs text-slate-400 mt-auto pt-3 font-sans">{recettes.length} opération{recettes.length>1?'s':''}</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border shadow-sm flex flex-col">
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-3 font-sans flex items-center"><Icon n="down" size={14} cls="mr-2 text-red-500"/>Dépenses Totales</p>
                            <p className="text-3xl font-bold font-serif text-red-500">{fmt(totalD)}</p>
                            <p className="text-xs text-slate-400 mt-auto pt-3 font-sans">{depenses.length} opération{depenses.length>1?'s':''}</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl border shadow-sm flex flex-col cursor-pointer hover:border-amber-400 transition-all" onClick={()=>onNav('cotisations')}>
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-3 font-sans flex items-center"><Icon n="users" size={14} cls="mr-2 text-amber-600"/>Cotisations {thisYear}</p>
                            <p className="text-3xl font-bold font-serif text-amber-600">{payees} / {membres.length||'—'}</p>
                            <div className="mt-3 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                <div className="h-full bg-amber-500 rounded-full" style={{width: membres.length?`${(payees/membres.length)*100}%`:'0%'}}></div>
                            </div>
                            <p className="text-xs text-slate-400 mt-2 font-sans">Membres à jour</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="bg-white p-8 rounded-2xl border shadow-sm">
                            <h3 className="font-bold text-amber-800 mb-6 flex items-center uppercase tracking-widest text-xs font-serif border-b pb-4">
                                <Icon n="cal" cls="mr-3" size={18}/> Dernières Opérations
                            </h3>
                            {recentes.length===0 ? <p className="text-slate-400 italic text-center py-8 font-sans">Aucune opération enregistrée.</p> : (
                                <div className="space-y-3">
                                    {recentes.map(t => (
                                        <div key={t.id} className="flex items-center justify-between py-3 border-b border-slate-50 last:border-0">
                                            <div className="flex items-center gap-3">
                                                <div className={`w-2 h-8 rounded-full flex-shrink-0 ${t.type==='recette'?'bg-emerald-400':'bg-red-400'}`}></div>
                                                <div>
                                                    <p className="font-bold text-sm text-slate-800">{t.libelle}</p>
                                                    <p className="text-[10px] text-slate-400 font-sans uppercase tracking-widest">{t.categorie} · {new Date(t.date).toLocaleDateString('fr-FR')}</p>
                                                </div>
                                            </div>
                                            <span className={`font-bold font-serif text-sm ${t.type==='recette'?'text-emerald-600':'text-red-500'}`}>{t.type==='recette'?'+':'-'}{fmt(t.montant)}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                            <button onClick={()=>onNav('transactions')} className="mt-6 w-full text-center text-amber-600 hover:text-amber-800 text-[10px] font-bold uppercase tracking-widest font-sans">Voir toutes les opérations →</button>
                        </div>

                        <div className="bg-white p-8 rounded-2xl border shadow-sm">
                            <h3 className="font-bold text-amber-800 mb-6 flex items-center uppercase tracking-widest text-xs font-serif border-b pb-4">
                                <Icon n="chart" cls="mr-3" size={18}/> Répartition par Catégorie
                            </h3>
                            {transactions.length===0 ? <p className="text-slate-400 italic text-center py-8 font-sans">Aucune donnée disponible.</p> : (
                                <div className="space-y-3">
                                    {Object.entries([...CATEGORIES_RECETTE,...CATEGORIES_DEPENSE].reduce((acc,cat)=>{
                                        const tx=transactions.filter(t=>t.categorie===cat);
                                        if(!tx.length) return acc;
                                        acc[cat]={total:tx.reduce((s,t)=>s+(t.montant||0),0),isR:CATEGORIES_RECETTE.includes(cat)};
                                        return acc;
                                    },{})).sort((a,b)=>b[1].total-a[1].total).slice(0,6).map(([cat,d])=>(
                                        <div key={cat} className="flex items-center justify-between gap-4">
                                            <div className="flex items-center gap-2 flex-1 min-w-0">
                                                <span className={`w-2 h-2 rounded-full flex-shrink-0 ${d.isR?'bg-emerald-400':'bg-red-400'}`}></span>
                                                <span className="text-xs font-medium text-slate-700 truncate">{cat}</span>
                                            </div>
                                            <span className={`text-xs font-bold font-serif flex-shrink-0 ${d.isR?'text-emerald-600':'text-red-500'}`}>{fmt(d.total)}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==============================
        // TRANSACTIONS
        // ==============================
        function TxForm({ initialData, onSave, onCancel }) {
            const [f, setF] = useState(initialData || { date: new Date().toISOString().split('T')[0], type:'recette', libelle:'', categorie:'Cotisation annuelle', montant:'', note:'' });
            const cats = f.type==='recette' ? CATEGORIES_RECETTE : CATEGORIES_DEPENSE;
            useEffect(()=>{ if(!cats.includes(f.categorie)) setF(p=>({...p,categorie:cats[0]})); },[f.type]);
            return (
                <form onSubmit={async e=>{e.preventDefault();await onSave({...f,montant:parseFloat(f.montant)||0});}} className="space-y-5 font-sans animate-fade">
                    <div className="flex bg-slate-100 p-1 rounded-xl">
                        <button type="button" onClick={()=>setF({...f,type:'recette'})} className={`flex-1 py-2.5 rounded-lg text-xs font-bold uppercase transition-all ${f.type==='recette'?'bg-emerald-600 text-white shadow':'text-slate-500'}`}>+ Recette</button>
                        <button type="button" onClick={()=>setF({...f,type:'depense'})} className={`flex-1 py-2.5 rounded-lg text-xs font-bold uppercase transition-all ${f.type==='depense'?'bg-red-500 text-white shadow':'text-slate-500'}`}>− Dépense</button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Date</label><input type="date" value={f.date} onChange={e=>setF({...f,date:e.target.value})} className="w-full border p-3 rounded-xl bg-slate-50 font-serif font-bold outline-none focus:border-amber-500" required /></div>
                        <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Montant (€)</label><input type="number" step="0.01" min="0" placeholder="0,00" value={f.montant} onChange={e=>setF({...f,montant:e.target.value})} className="w-full border p-3 rounded-xl bg-slate-50 font-serif font-bold outline-none focus:border-amber-500" required /></div>
                    </div>
                    <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Libellé</label><input type="text" placeholder="Description de l'opération..." value={f.libelle} onChange={e=>setF({...f,libelle:e.target.value})} className="w-full border p-3 rounded-xl bg-slate-50 font-bold outline-none focus:border-amber-500" required /></div>
                    <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Catégorie</label>
                        <select value={f.categorie} onChange={e=>setF({...f,categorie:e.target.value})} className="w-full border p-3 rounded-xl bg-slate-50 font-bold outline-none focus:border-amber-500">
                            {cats.map(c=><option key={c}>{c}</option>)}
                        </select>
                    </div>
                    <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Note (optionnel)</label><textarea value={f.note} onChange={e=>setF({...f,note:e.target.value})} placeholder="Commentaire..." className="w-full border p-3 rounded-xl bg-slate-50 h-20 outline-none focus:border-amber-500 text-sm resize-none"></textarea></div>
                    <div className="flex justify-end gap-4 pt-2">
                        <button type="button" onClick={onCancel} className="text-slate-400 font-bold text-xs uppercase tracking-widest">Annuler</button>
                        <button type="submit" className={`px-10 py-3 rounded-xl font-bold text-white shadow-lg text-xs uppercase tracking-widest font-serif ${f.type==='recette'?'bg-emerald-600 hover:bg-emerald-700':'bg-red-500 hover:bg-red-600'}`}>Enregistrer</button>
                    </div>
                </form>
            );
        }

        function TransactionsView({ transactions, onAdd, onUpdate, onDelete }) {
            const [isAdding, setIsAdding] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [filterType, setFilterType] = useState('all');
            const [filterYear, setFilterYear] = useState(String(new Date().getFullYear()));
            const years = useMemo(()=>[...new Set(transactions.map(t=>t.date?.split('-')[0]).filter(Boolean))].sort((a,b)=>b-a),[transactions]);
            const filtered = useMemo(()=>transactions.filter(t=>{
                if(filterType!=='all'&&t.type!==filterType) return false;
                if(filterYear!=='all'&&t.date?.split('-')[0]!==filterYear) return false;
                return true;
            }).sort((a,b)=>new Date(b.date)-new Date(a.date)),[transactions,filterType,filterYear]);
            const totalFiltered = filtered.reduce((s,t)=>t.type==='recette'?s+(t.montant||0):s-(t.montant||0),0);

            return (
                <div className="space-y-6 animate-fade">
                    <div className="bg-white p-6 rounded-2xl border flex flex-col md:flex-row justify-between items-center gap-4 shadow-sm">
                        <h2 className="text-2xl font-bold font-serif text-slate-800">Livre de Caisse</h2>
                        <div className="flex flex-wrap gap-2">
                            <div className="flex bg-slate-100 p-1 rounded-xl">
                                {[['all','Tout'],['recette','Recettes'],['depense','Dépenses']].map(([v,l])=>(
                                    <button key={v} onClick={()=>setFilterType(v)} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all ${filterType===v?'bg-white text-amber-600 shadow':'text-slate-500'}`}>{l}</button>
                                ))}
                            </div>
                            <select value={filterYear} onChange={e=>setFilterYear(e.target.value)} className="border bg-slate-50 px-3 py-1.5 rounded-xl text-xs font-bold outline-none focus:border-amber-500">
                                <option value="all">Toutes années</option>
                                {years.map(y=><option key={y}>{y}</option>)}
                            </select>
                            <button onClick={()=>{setIsAdding(!isAdding);setEditingId(null);}} className="bg-amber-600 text-white px-5 py-2 rounded-xl text-xs font-bold uppercase shadow-md font-serif flex items-center gap-2"><Icon n="plus" size={16}/> Opération</button>
                        </div>
                    </div>
                    {isAdding && <div className="bg-white p-8 rounded-2xl border shadow-xl"><TxForm onSave={async d=>{await onAdd(d);setIsAdding(false);}} onCancel={()=>setIsAdding(false)} /></div>}
                    <div className="bg-white rounded-2xl border shadow-sm overflow-hidden">
                        <div className="p-4 bg-slate-50 border-b flex justify-between items-center">
                            <span className="text-xs font-bold text-slate-500 uppercase tracking-widest font-sans">{filtered.length} opération{filtered.length>1?'s':''}</span>
                            <span className={`font-bold font-serif text-sm ${totalFiltered>=0?'text-emerald-600':'text-red-500'}`}>Solde filtré : {fmt(totalFiltered)}</span>
                        </div>
                        {filtered.length===0 ? <p className="text-center py-16 text-slate-400 italic font-sans">Aucune opération pour cette sélection.</p> : (
                            <div className="divide-y divide-slate-50">
                                {filtered.map(t=>editingId===t.id ? (
                                    <div key={t.id} className="p-6"><TxForm initialData={t} onSave={async d=>{await onUpdate(t.id,d);setEditingId(null);}} onCancel={()=>setEditingId(null)} /></div>
                                ) : (
                                    <div key={t.id} className="flex items-center justify-between px-6 py-4 hover:bg-slate-50 transition-colors group">
                                        <div className="flex items-center gap-4">
                                            <div className={`w-1.5 h-10 rounded-full flex-shrink-0 ${t.type==='recette'?'bg-emerald-400':'bg-red-400'}`}></div>
                                            <div>
                                                <p className="font-bold text-slate-800 text-sm">{t.libelle}</p>
                                                <p className="text-[10px] text-slate-400 uppercase tracking-widest font-sans">{t.categorie} · {new Date(t.date).toLocaleDateString('fr-FR')}</p>
                                                {t.note && <p className="text-[10px] text-slate-400 italic mt-0.5">{t.note}</p>}
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <span className={`font-bold font-serif text-base ${t.type==='recette'?'text-emerald-600':'text-red-500'}`}>{t.type==='recette'?'+':'-'}{fmt(t.montant)}</span>
                                            <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <button onClick={()=>setEditingId(t.id)} className="p-1.5 text-slate-300 hover:text-amber-600"><Icon n="edit" size={14}/></button>
                                                <button onClick={()=>onDelete(t.id)} className="p-1.5 text-slate-300 hover:text-red-500"><Icon n="trash" size={14}/></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==============================
        // COTISATIONS (versements mensuels)
        // ==============================
        const MOIS = ['Jan','Fév','Mar','Avr','Mai','Jui','Jul','Aoû','Sep','Oct','Nov','Déc'];

        function PayMoisModal({ membre, annee, mois, onConfirm, onCancel }) {
            const [montant, setMontant] = useState('');
            const [note, setNote] = useState('');
            return (
                <div className="fixed inset-0 bg-slate-900/80 z-[200] flex items-center justify-center p-4 animate-fade">
                    <div className="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl">
                        <h2 className="text-xl font-serif font-bold mb-1">Versement reçu</h2>
                        <p className="text-slate-500 text-sm mb-1 font-sans">{membre.nom}</p>
                        <p className="text-amber-700 text-xs font-bold uppercase tracking-widest mb-6 font-sans">{MOIS[mois-1]} {annee}</p>
                        <div className="space-y-4">
                            <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5 font-sans">Montant reçu (€)</label><input type="number" step="0.01" min="0" autoFocus placeholder="ex: 50" value={montant} onChange={e=>setMontant(e.target.value)} className="w-full border-2 p-3 rounded-xl text-base font-bold outline-none focus:border-emerald-500" /></div>
                            <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5 font-sans">Note (optionnel)</label><input type="text" placeholder="Chèque n°, virement, espèces..." value={note} onChange={e=>setNote(e.target.value)} className="w-full border p-3 rounded-xl text-sm outline-none focus:border-emerald-500" /></div>
                        </div>
                        <div className="flex gap-3 mt-6">
                            <button onClick={onCancel} className="flex-1 text-slate-400 font-bold text-xs uppercase py-3 border rounded-xl font-sans">Annuler</button>
                            <button onClick={()=>onConfirm(parseFloat(montant)||0,note)} className="flex-1 bg-emerald-600 text-white font-bold text-xs uppercase py-3 rounded-xl shadow-md font-serif">Confirmer</button>
                        </div>
                    </div>
                </div>
            );
        }

        function CotisationsView({ membres, cotisations, onAddVersement, onDeleteVersement }) {
            const [annee, setAnnee] = useState(String(new Date().getFullYear()));
            const [payModal, setPayModal] = useState(null); // {membreId, mois}
            const [expanded, setExpanded] = useState(null);
            const years = useMemo(()=>{
                const ys=new Set(cotisations.map(c=>String(c.annee)));
                ys.add(String(new Date().getFullYear()));
                return [...ys].sort((a,b)=>b-a);
            },[cotisations]);

            const montantTotalAnnee = cotisations.filter(c=>String(c.annee)===annee).reduce((s,c)=>s+(c.montant||0),0);
            const membresAvecVersements = membres.filter(m=>cotisations.some(c=>c.membreId===m.id&&String(c.annee)===annee)).length;

            const payModal_membre = payModal ? membres.find(m=>m.id===payModal.membreId) : null;

            const confirmPay = (montant, note) => {
                onAddVersement(payModal.membreId, annee, payModal.mois, montant, note);
                setPayModal(null);
            };

            return (
                <div className="space-y-6 animate-fade">
                    {payModal && payModal_membre && <PayMoisModal membre={payModal_membre} annee={annee} mois={payModal.mois} onConfirm={confirmPay} onCancel={()=>setPayModal(null)} />}

                    <div className="bg-white p-6 rounded-2xl border flex flex-col md:flex-row justify-between items-center gap-4 shadow-sm">
                        <div>
                            <h2 className="text-2xl font-bold font-serif text-slate-800">Cotisations</h2>
                            <p className="text-slate-500 text-sm font-sans mt-1">Versements mensuels par membre</p>
                        </div>
                        <select value={annee} onChange={e=>setAnnee(e.target.value)} className="border bg-slate-50 px-4 py-2.5 rounded-xl text-sm font-bold outline-none focus:border-amber-500">
                            {years.map(y=><option key={y}>{y}</option>)}
                        </select>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div className="bg-white p-5 rounded-2xl border shadow-sm text-center"><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 font-sans">Membres ayant versé</p><p className="text-3xl font-bold font-serif text-emerald-600">{membresAvecVersements} <span className="text-slate-300 text-2xl">/</span> {membres.length}</p></div>
                        <div className="bg-white p-5 rounded-2xl border shadow-sm text-center"><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 font-sans">Versements enregistrés</p><p className="text-3xl font-bold font-serif text-amber-600">{cotisations.filter(c=>String(c.annee)===annee).length}</p></div>
                        <div className="bg-white p-5 rounded-2xl border shadow-sm text-center"><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 font-sans">Total encaissé {annee}</p><p className="text-3xl font-bold font-serif text-emerald-600">{fmt(montantTotalAnnee)}</p></div>
                    </div>

                    {membres.length===0 ? (
                        <div className="bg-white p-12 rounded-2xl border text-center text-slate-400 italic font-sans">Aucun membre. Ajoutez-en dans l'onglet Paramètres.</div>
                    ) : (
                        <div className="space-y-3">
                            {membres.map(m=>{
                                const versements = cotisations.filter(c=>c.membreId===m.id&&String(c.annee)===annee);
                                const totalMembre = versements.reduce((s,c)=>s+(c.montant||0),0);
                                const moisPaies = new Set(versements.map(c=>c.mois));
                                const isExpanded = expanded===m.id;
                                return (
                                    <div key={m.id} className="bg-white rounded-2xl border shadow-sm overflow-hidden">
                                        <div className="flex items-center justify-between px-6 py-4 cursor-pointer hover:bg-slate-50 transition-colors" onClick={()=>setExpanded(isExpanded?null:m.id)}>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex items-center gap-3">
                                                    <p className="font-bold text-slate-800">{m.nom}</p>
                                                    {m.role && <span className="text-[10px] text-amber-700 uppercase font-bold tracking-widest font-sans bg-amber-50 px-2 py-0.5 rounded-full border border-amber-200">{m.role}</span>}
                                                </div>
                                                <div className="flex items-center gap-1 mt-2 flex-wrap">
                                                    {MOIS.map((ml,i)=>{
                                                        const v=versements.find(c=>c.mois===i+1);
                                                        return <span key={i} title={v?`${ml}: ${fmt(v.montant)}${v.note?` — ${v.note}`:''}`:'Non versé'} className={`text-[9px] font-bold px-1.5 py-0.5 rounded font-sans ${v?'bg-emerald-100 text-emerald-700':'bg-slate-100 text-slate-400'}`}>{ml}</span>;
                                                    })}
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-4 ml-4 flex-shrink-0">
                                                <div className="text-right">
                                                    <p className="font-bold font-serif text-emerald-600">{fmt(totalMembre)}</p>
                                                    <p className="text-[10px] text-slate-400 font-sans">{moisPaies.size} mois</p>
                                                </div>
                                                <i className={`fa-solid fa-chevron-${isExpanded?'up':'down'} text-slate-300 text-xs`}></i>
                                            </div>
                                        </div>
                                        {isExpanded && (
                                            <div className="border-t bg-slate-50 p-4 animate-fade">
                                                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 font-sans">Cliquez sur un mois pour enregistrer ou supprimer un versement</p>
                                                <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-12 gap-2">
                                                    {MOIS.map((ml,i)=>{
                                                        const moisNum = i+1;
                                                        const v = versements.find(c=>c.mois===moisNum);
                                                        return (
                                                            <button key={i} onClick={()=>v ? onDeleteVersement(v.id) : setPayModal({membreId:m.id,mois:moisNum})}
                                                                className={`flex flex-col items-center p-2 rounded-xl border-2 transition-all ${v?'bg-emerald-50 border-emerald-300 hover:bg-red-50 hover:border-red-300':'bg-white border-slate-200 hover:border-amber-400'}`}
                                                                title={v?`Supprimer: ${fmt(v.montant)}`:`Ajouter versement ${ml}`}>
                                                                <span className={`text-[10px] font-bold font-sans ${v?'text-emerald-700':'text-slate-400'}`}>{ml}</span>
                                                                {v ? (
                                                                    <span className="text-[9px] text-emerald-600 font-bold font-serif mt-0.5">{fmt(v.montant)}</span>
                                                                ) : (
                                                                    <i className="fa-solid fa-plus text-slate-300 text-[10px] mt-0.5"></i>
                                                                )}
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                                {versements.length>0 && (
                                                    <div className="mt-4 space-y-1">
                                                        {versements.sort((a,b)=>a.mois-b.mois).map(v=>(
                                                            <div key={v.id} className="flex items-center justify-between text-xs text-slate-600 bg-white rounded-lg px-3 py-2 border">
                                                                <span className="font-bold">{MOIS[v.mois-1]}</span>
                                                                <span className="font-serif font-bold text-emerald-600">{fmt(v.montant)}</span>
                                                                {v.note && <span className="text-slate-400 italic hidden sm:block">{v.note}</span>}
                                                                <span className="text-slate-300">{v.datePaiement ? new Date(v.datePaiement).toLocaleDateString('fr-FR') : ''}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        // ==============================
        // PARAMÈTRES
        // ==============================
        function ParametresView({ settings, membres, onSaveSettings, onAddMembre, onUpdateMembre, onDeleteMembre }) {
            const [sf, setSf] = useState({ logeName: settings.logeName||'', orient: settings.orient||'', montantCotis: settings.montantCotis||'' });
            const [saving, setSaving] = useState(false);
            const [isAddingM, setIsAddingM] = useState(false);
            const [editingMId, setEditingMId] = useState(null);
            const [mForm, setMForm] = useState({ nom:'', role:'' });

            useEffect(()=>{
                setSf({ logeName: settings.logeName||'', orient: settings.orient||'', montantCotis: settings.montantCotis||'' });
            },[settings]);

            const saveSettings = async () => {
                setSaving(true);
                await onSaveSettings({ ...sf, montantCotis: parseFloat(sf.montantCotis)||0 });
                setSaving(false);
            };

            const startEditM = (m) => { setEditingMId(m.id); setMForm({nom:m.nom,role:m.role||''}); };
            const cancelEditM = () => { setEditingMId(null); setMForm({nom:'',role:''}); };

            return (
                <div className="space-y-8 animate-fade">
                    {/* Informations de la Loge */}
                    <div className="bg-white p-8 rounded-2xl border shadow-sm">
                        <h3 className="text-lg font-bold font-serif mb-6 border-b pb-4 flex items-center gap-3"><Icon n="landmark" cls="text-amber-600"/> Informations de la Loge</h3>
                        <div className="space-y-4 max-w-lg">
                            <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Nom de la Loge</label><input type="text" value={sf.logeName} onChange={e=>setSf({...sf,logeName:e.target.value})} placeholder="ex: R∴L∴ Comte Guifré n°51" className="w-full border p-3 rounded-xl bg-slate-50 font-bold outline-none focus:border-amber-500" /></div>
                            <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Orient</label><input type="text" value={sf.orient} onChange={e=>setSf({...sf,orient:e.target.value})} placeholder="ex: Perpignan" className="w-full border p-3 rounded-xl bg-slate-50 outline-none focus:border-amber-500" /></div>
                            <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Montant cotisation annuelle (€)</label><input type="number" step="0.01" min="0" value={sf.montantCotis} onChange={e=>setSf({...sf,montantCotis:e.target.value})} placeholder="ex: 150" className="w-full border p-3 rounded-xl bg-slate-50 font-bold outline-none focus:border-amber-500" /></div>
                            <button onClick={saveSettings} disabled={saving} className="bg-amber-600 hover:bg-amber-700 text-white px-8 py-3 rounded-xl font-bold text-xs uppercase tracking-widest shadow-md font-serif transition-all disabled:opacity-50">
                                {saving ? 'Enregistrement...' : 'Enregistrer'}
                            </button>
                        </div>
                    </div>

                    {/* Gestion des membres */}
                    <div className="bg-white p-8 rounded-2xl border shadow-sm">
                        <div className="flex justify-between items-center border-b pb-4 mb-6">
                            <h3 className="text-lg font-bold font-serif flex items-center gap-3"><Icon n="users" cls="text-amber-600"/> Membres ({membres.length})</h3>
                            <button onClick={()=>{setIsAddingM(!isAddingM);cancelEditM();}} className="bg-amber-600 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase shadow-sm flex items-center gap-2"><Icon n={isAddingM?'x':'plus'} size={14}/>{isAddingM?'Annuler':'Ajouter'}</button>
                        </div>

                        {isAddingM && (
                            <div className="bg-slate-50 p-6 rounded-2xl border mb-6 animate-fade">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Nom complet *</label><input type="text" autoFocus value={mForm.nom} onChange={e=>setMForm({...mForm,nom:e.target.value})} placeholder="Frère / Sœur..." className="w-full border p-3 rounded-xl bg-white font-bold outline-none focus:border-amber-500" /></div>
                                    <div><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1.5">Grade / Fonction</label><input type="text" value={mForm.role} onChange={e=>setMForm({...mForm,role:e.target.value})} placeholder="ex: Maître, Trésorier..." className="w-full border p-3 rounded-xl bg-white outline-none focus:border-amber-500" /></div>
                                </div>
                                <div className="flex gap-3 justify-end">
                                    <button onClick={()=>{setIsAddingM(false);setMForm({nom:'',role:''}); }} className="text-slate-400 font-bold text-xs uppercase">Annuler</button>
                                    <button onClick={async()=>{if(!mForm.nom.trim())return;await onAddMembre(mForm);setIsAddingM(false);setMForm({nom:'',role:''}); }} className="bg-amber-600 text-white px-6 py-2 rounded-xl font-bold text-xs uppercase shadow-sm">Ajouter</button>
                                </div>
                            </div>
                        )}

                        {membres.length===0 ? (
                            <p className="text-slate-400 italic text-center py-8 font-sans">Aucun membre. Cliquez sur "Ajouter" pour commencer.</p>
                        ) : (
                            <div className="divide-y">
                                {membres.map(m=>(
                                    <div key={m.id} className="py-4">
                                        {editingMId===m.id ? (
                                            <div className="bg-slate-50 p-4 rounded-xl border animate-fade">
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                                    <input type="text" value={mForm.nom} onChange={e=>setMForm({...mForm,nom:e.target.value})} className="border p-3 rounded-xl bg-white font-bold outline-none focus:border-amber-500" />
                                                    <input type="text" value={mForm.role} onChange={e=>setMForm({...mForm,role:e.target.value})} placeholder="Grade / Fonction" className="border p-3 rounded-xl bg-white outline-none focus:border-amber-500" />
                                                </div>
                                                <div className="flex gap-3 justify-end">
                                                    <button onClick={cancelEditM} className="text-slate-400 font-bold text-xs uppercase">Annuler</button>
                                                    <button onClick={async()=>{await onUpdateMembre(m.id,mForm);cancelEditM();}} className="bg-amber-600 text-white px-6 py-2 rounded-xl font-bold text-xs uppercase shadow-sm">Valider</button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="flex items-center justify-between group">
                                                <div>
                                                    <p className="font-bold text-slate-800">{m.nom}</p>
                                                    {m.role && <p className="text-[10px] text-amber-700 uppercase font-bold tracking-widest font-sans">{m.role}</p>}
                                                </div>
                                                <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button onClick={()=>startEditM(m)} className="p-2 text-slate-300 hover:text-amber-600"><Icon n="edit" size={14}/></button>
                                                    <button onClick={()=>onDeleteMembre(m.id)} className="p-2 text-slate-300 hover:text-red-500"><Icon n="trash" size={14}/></button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==============================
        // APP
        // ==============================
        function App() {
            const api = window.FB_API;
            const [ready, setReady] = useState(false);
            const [activeView, setActiveView] = useState('dashboard');
            const [transactions, setTransactions] = useState([]);
            const [cotisations, setCotisations] = useState([]);
            const [membres, setMembres] = useState([]);
            const [settings, setSettings] = useState({ logeName:'', orient:'', montantCotis:0 });

            const path = (c) => api.collection(api.db, 'artifacts', api.appId, 'public', 'data', c);

            useEffect(()=>{
                if(!api) return;
                api.signInAnonymously(api.auth).then(()=>setReady(true)).catch(console.error);
            },[api]);

            useEffect(()=>{
                if(!api||!ready) return;
                const unsubTx = api.onSnapshot(path('tresor_transactions'),s=>setTransactions(s.docs.map(d=>({id:d.id,...d.data()}))));
                const unsubCot = api.onSnapshot(path('tresor_cotisations'),s=>setCotisations(s.docs.map(d=>({id:d.id,...d.data()}))));
                const unsubM = api.onSnapshot(path('tresor_membres'),s=>setMembres(s.docs.map(d=>({id:d.id,...d.data()}))));
                const unsubS = api.onSnapshot(api.doc(api.db,'artifacts',api.appId,'public','data','tresor_settings','config'),d=>{if(d.exists()) setSettings(d.data());});
                return ()=>{unsubTx();unsubCot();unsubM();unsubS();};
            },[api,ready]);

            const logeName = settings.logeName || 'Trésorerie';
            const orient = settings.orient || '';

            // Transactions
            const addTx = async d => await api.addDoc(path('tresor_transactions'),d);
            const updateTx = async (id,d) => await api.updateDoc(api.doc(api.db,'artifacts',api.appId,'public','data','tresor_transactions',id),d);
            const deleteTx = async id => await api.deleteDoc(api.doc(api.db,'artifacts',api.appId,'public','data','tresor_transactions',id));

            // Cotisations mensuelles
            const addVersement = async (membreId,annee,mois,montant,note) => {
                await api.addDoc(path('tresor_cotisations'),{
                    membreId, annee:parseInt(annee), mois, montant, note,
                    datePaiement: new Date().toISOString().split('T')[0]
                });
            };
            const deleteVersement = async id => await api.deleteDoc(api.doc(api.db,'artifacts',api.appId,'public','data','tresor_cotisations',id));

            // Membres
            const addMembre = async d => await api.addDoc(path('tresor_membres'),d);
            const updateMembre = async (id,d) => await api.updateDoc(api.doc(api.db,'artifacts',api.appId,'public','data','tresor_membres',id),d);
            const deleteMembre = async id => await api.deleteDoc(api.doc(api.db,'artifacts',api.appId,'public','data','tresor_membres',id));

            // Settings
            const saveSettings = async d => await api.setDoc(api.doc(api.db,'artifacts',api.appId,'public','data','tresor_settings','config'),d);

            if(!ready) return null;
            const loader = document.getElementById('loading-screen');
            if(loader) loader.style.display='none';

            const navItems = [
                {id:'dashboard',icon:'home',label:'Bilan'},
                {id:'transactions',icon:'file',label:'Livre de caisse'},
                {id:'cotisations',icon:'users',label:'Cotisations'},
                {id:'parametres',icon:'settings',label:'Paramètres'},
            ];

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    <nav className="bg-slate-900 text-white shadow-xl sticky top-0 z-50 p-3">
                        <div className="max-w-7xl mx-auto flex justify-between items-center gap-4">
                            <div className="flex items-center space-x-3 cursor-pointer" onClick={()=>setActiveView('dashboard')}>
                                <Icon n="wallet" size={24} cls="text-amber-500"/>
                                <div className="hidden md:block">
                                    <span className="text-base font-bold font-serif text-white tracking-widest uppercase">{logeName}</span>
                                    {orient && <span className="block text-[9px] text-slate-400 font-sans uppercase tracking-widest">Orient de {orient}</span>}
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                {navItems.map(item=>(
                                    <button key={item.id} onClick={()=>setActiveView(item.id)} className={`flex items-center space-x-1.5 px-3 py-2 rounded-xl text-[10px] font-bold uppercase transition-all font-serif ${activeView===item.id?'bg-amber-600 text-white shadow-lg':'text-slate-400 hover:bg-slate-800 hover:text-amber-300'}`}>
                                        <Icon n={item.icon} size={14}/><span className="hidden sm:inline font-sans">{item.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>
                    <main className="max-w-7xl mx-auto px-4 py-8 flex-grow w-full">
                        {activeView==='dashboard' && <DashboardView transactions={transactions} cotisations={cotisations} membres={membres} settings={settings} onNav={setActiveView}/>}
                        {activeView==='transactions' && <TransactionsView transactions={transactions} onAdd={addTx} onUpdate={updateTx} onDelete={deleteTx}/>}
                        {activeView==='cotisations' && <CotisationsView membres={membres} cotisations={cotisations} onAddVersement={addVersement} onDeleteVersement={deleteVersement}/>}
                        {activeView==='parametres' && <ParametresView settings={settings} membres={membres} onSaveSettings={saveSettings} onAddMembre={addMembre} onUpdateMembre={updateMembre} onDeleteMembre={deleteMembre}/>}
                    </main>
                    <footer className="py-8 text-center text-slate-400 text-[10px] uppercase font-bold tracking-[0.2em] border-t bg-white font-serif">{logeName}{orient?` — Orient de ${orient}`:''} — Trésorerie</footer>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        if(rootElement && !rootElement._reactRoot){
            const root = ReactDOM.createRoot(rootElement);
            rootElement._reactRoot = root;
            root.render(<App/>);
        }
    </script>
</body>
</html>
