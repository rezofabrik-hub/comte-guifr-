        // --- HELPERS IA ANALYSE ODJ ---
        const extractPDFText = async (file) => {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            const ab = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: ab}).promise;
            let text = '';
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(x => x.str).join(' ') + '\n';
            }
            return text;
        };

        const analyzeODJWithAI = async (text, apiKey) => {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({
                    contents: [{parts: [{text: `Analyse cet ordre du jour maçonnique et retourne UNIQUEMENT un objet JSON valide (sans markdown) avec ces champs:\n- "date": date au format YYYY-MM-DD (l'année maçonnique ex: 6026=2026, 6025=2025)\n- "visibility": "Apprenti" si Premier degré, "Compagnon" si Deuxième degré, "Maître" si Troisième degré\n- "planche_auteur": nom complet de l'auteur de la planche (null si aucune planche explicite)\n- "planche_titre": titre exact de la planche entre guillemets (null si aucune)\n- "sujet": résumé en une phrase de l'objet principal des travaux\n\nTexte ODJ:\n${text}`}]}],
                    generationConfig: { temperature: 0, maxOutputTokens: 512 }
                })
            });
            if (!res.ok) throw new Error('Erreur API Gemini ' + res.status);
            const data = await res.json();
            let jsonStr = data.candidates[0].content.parts[0].text.trim();
            if (jsonStr.startsWith('```')) jsonStr = jsonStr.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
            return JSON.parse(jsonStr);
        };

        function AdherentsView({ members, onAdd, onUpdate, onDelete, canEdit }) {
            const [isAdding, sA] = useState(false); const [v, sV] = useState('grid');
            const grp = (title, list) => list.length > 0 && (
                <div className="mb-12 animate-fade">
                    <h3 className="text-lg font-bold text-amber-800 border-b border-amber-100 pb-2 mb-6 flex items-center uppercase tracking-widest"><SmartIcon name="Users" size={18} className="mr-2"/> {title}</h3>
                    <div className={v==='grid' ? "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4" : "space-y-2"}>
                        {list.map(m => <MemberCard key={m.id} member={m} view={v} onUpdate={onUpdate} onDelete={onDelete} canEdit={canEdit} />)}
                    </div>
                </div>
            );
            
            const isOfficier = (r) => {
                const role = (r || '').toLowerCase().trim();
                if (!role) return false;
                if (role.includes('apprenti') || role.includes('compagnon')) return false;
                if (role === 'maître' || role === 'maitre' || role === 'maîtres' || role === 'maitres') return false;
                return true;
            };

            const getOfficerRank = (role) => {
                const r = (role || '').toLowerCase();
                if (r.includes('vénérable') || r.includes('venerable')) return 1;
                if (r.includes('1er surveillant') || r.includes('premier surveillant')) return 2;
                if (r.includes('2nd surveillant') || r.includes('second surveillant') || r.includes('deuxième surveillant')) return 3;
                return 4;
            };

            const officiers = members.filter(m => isOfficier(m.role)).sort((a, b) => getOfficerRank(a.role) - getOfficerRank(b.role));
            
            const maitres = members.filter(m => {
                const r = (m.role || '').toLowerCase().trim();
                return r === 'maître' || r === 'maitre' || r === 'maîtres' || r === 'maitres';
            });
            const compagnons = members.filter(m => (m.role || '').toLowerCase().includes('compagnon'));
            const apprentis = members.filter(m => (m.role || '').toLowerCase().includes('apprenti'));

            return (
                <div className="space-y-6">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-6 rounded-2xl border mb-6 shadow-sm">

                        </div>
                    </div>
                    {isAdding && <div className="bg-white p-6 rounded-2xl border shadow-lg mb-8"><MemberForm onSave={async(d)=>{await onAdd(d);sA(false);}} onCancel={()=>sA(false)}/></div>}
                    {grp("Collège des Officiers", officiers)}
                    {grp("Maîtres", maitres)}
                    {grp("Compagnons", compagnons)}
                    {grp("Apprentis", apprentis)}
                </div>
            );
        }

        function AgendaForm({ initialData, onSave, onCancel, apiKey }) {
            const [f, s] = useState(initialData || { date: new Date().toISOString().split('T')[0], type:'Tenue Régulière', visibility:'Apprenti', sujet:'', agapes:'', entree:'', plat:'', dessert:'', lienFramadate:'', planches: [], odjFile:null });
            const [loading, setLoading] = useState(false);
            const [analyzing, setAnalyzing] = useState(false);
            const [aiError, setAiError] = useState('');

            const handleAI = async (e) => {
                const file = e.target.files[0]; if(!file) return;
                setLoading(true); setAiError(''); setAnalyzing(false);
                try {
                    const [url, pdfText] = await Promise.all([
                        window.FB_API.uploadFile(file, 'cg51/agenda-odj'),
                        apiKey ? extractPDFText(file) : Promise.resolve(null)
                    ]);
                    s(prev => ({...prev, odjFile: { name: file.name, data: url }}));
                    if (apiKey && pdfText) {
                        setAnalyzing(true);
                        const result = await analyzeODJWithAI(pdfText, apiKey);
                        s(prev => ({
                            ...prev,
                            date: result.date || prev.date,
                            visibility: result.visibility || prev.visibility,
                            sujet: result.sujet || prev.sujet,
                            planches: result.planche_auteur ? [{title: result.planche_titre || '', author: result.planche_auteur, grade: result.visibility}] : prev.planches
                        }));
                    }
                } catch(err) {
                    console.error("Erreur analyse ODJ", err);
                    setAiError("Analyse IA échouée — vérifiez la clé API ou remplissez manuellement.");
                } finally { setLoading(false); setAnalyzing(false); }
            };

            return (
                <form onSubmit={async(e)=>{e.preventDefault(); await onSave(f);}} className="space-y-6 font-sans text-sm text-slate-800 animate-fade">
                    <div className="bg-amber-50 p-6 rounded-2xl border border-amber-200">
                        <label className="text-[10px] font-black text-amber-800 uppercase block mb-2 flex items-center font-sans"><SmartIcon name="FileText" size={16} className="mr-2"/>Ordre du jour (PDF)</label>
                        {!f.odjFile ? (
                            <input type="file" accept=".pdf" onChange={handleAI} className="text-xs w-full shadow-sm bg-white p-2 rounded-xl" />
                        ) : (
                            <div className="flex items-center justify-between bg-white p-3 rounded-xl border border-amber-200">
                                <div className="flex items-center text-amber-800 font-bold font-sans"><SmartIcon name="FileText" className="mr-2"/>{f.odjFile.name}</div>
                                <button type="button" onClick={()=>s({...f, odjFile: null})} className="text-red-500 hover:text-red-700 font-bold text-[10px] uppercase underline">Retirer le fichier</button>
                            </div>
                        )}
                        {loading && !analyzing && <p className="mt-2 text-[10px] font-bold text-amber-600 animate-pulse uppercase tracking-widest font-serif">Envoi du fichier...</p>}
                        {analyzing && <p className="mt-2 text-[10px] font-bold text-blue-600 animate-pulse uppercase tracking-widest font-serif">Analyse IA en cours...</p>}
                        {aiError && <p className="mt-2 text-[10px] font-bold text-red-500 uppercase">{aiError}</p>}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 font-sans text-slate-800">
                        <input type="date" value={f.date} onChange={e=>s({...f,date:e.target.value})} className="border p-3 rounded-xl bg-slate-50 font-bold font-serif" required />
                        <input type="text" placeholder="Nature" value={f.type} onChange={e=>s({...f,type:e.target.value})} className="border p-3 rounded-xl bg-slate-50 font-bold font-serif" required />
                        <select value={f.visibility} onChange={e=>s({...f,visibility:e.target.value})} className="border p-3 rounded-xl bg-slate-50 font-bold text-amber-700 font-serif">
                            <option value="Apprenti">Apprenti (Visible tous)</option>
                            <option value="Compagnon">Compagnon (Compagnon+Maitre)</option>
                            <option value="Maître">Maître (Maitre seul)</option>
                        </select>
                    </div>
                    
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-4">
                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Détails des Agapes</h4>
                        <input type="text" placeholder="Nom de l'Intendant(e)" value={f.agapes} onChange={e=>s({...f,agapes:e.target.value})} className="w-full border p-3 rounded-xl bg-white font-bold font-serif" />
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                            <input type="text" placeholder="Entrée" value={f.entree} onChange={e=>s({...f,entree:e.target.value})} className="w-full border p-2 rounded-lg bg-white text-xs" />
                            <input type="text" placeholder="Plat" value={f.plat} onChange={e=>s({...f,plat:e.target.value})} className="w-full border p-2 rounded-lg bg-white text-xs" />
                            <input type="text" placeholder="Dessert" value={f.dessert} onChange={e=>s({...f,dessert:e.target.value})} className="w-full border p-2 rounded-lg bg-white text-xs" />
                        </div>
                        <input type="url" placeholder="Lien Framadate pour les inscriptions (Optionnel)" value={f.lienFramadate} onChange={e=>s({...f,lienFramadate:e.target.value})} className="w-full border p-2 rounded-lg bg-white text-xs text-amber-600" />
                    </div>

                    <textarea placeholder="Résumé de l'ordre du jour..." value={f.sujet} onChange={e=>s({...f,sujet:e.target.value})} className="w-full border p-4 rounded-xl h-24 outline-none focus:border-amber-500 shadow-inner font-serif" required></textarea>
                    {f.planches && f.planches.length > 0 && (
                        <div className="bg-blue-50 p-4 rounded-xl border border-blue-200 animate-fade">
                            <p className="text-[10px] font-bold text-blue-700 uppercase tracking-widest mb-3 font-sans">Planche détectée automatiquement</p>
                            {f.planches.map((p, i) => (
                                <div key={i} className="bg-white p-3 rounded-lg border border-blue-100 space-y-2">
                                    <input type="text" value={p.title} onChange={e=>{const pl=[...f.planches]; pl[i]={...pl[i],title:e.target.value}; s({...f,planches:pl});}} placeholder="Titre de la planche" className="w-full border p-2 rounded text-sm font-bold outline-none focus:border-amber-500" />
                                    <input type="text" value={p.author} onChange={e=>{const pl=[...f.planches]; pl[i]={...pl[i],author:e.target.value}; s({...f,planches:pl});}} placeholder="Auteur" className="w-full border p-2 rounded text-sm outline-none focus:border-amber-500" />
                                    <select value={p.grade} onChange={e=>{const pl=[...f.planches]; pl[i]={...pl[i],grade:e.target.value}; s({...f,planches:pl});}} className="w-full border p-2 rounded text-sm outline-none focus:border-amber-500">
                                        <option>Apprenti</option><option>Compagnon</option><option>Maître</option>
                                    </select>
                                </div>
                            ))}
                            <button type="button" onClick={()=>s({...f,planches:[]})} className="mt-2 text-red-400 text-[10px] font-bold uppercase hover:underline">Effacer</button>
                        </div>
                    )}
                    <div className="flex justify-end gap-4 uppercase font-bold text-[10px] tracking-widest font-sans font-bold"><button type="button" onClick={onCancel} className="text-slate-400 font-sans">Annuler</button><button type="submit" className="bg-amber-600 text-white px-10 py-3 rounded-xl shadow-lg hover:bg-amber-700 font-serif">Enregistrer la tenue</button></div>
                </form>
            );
        }

        function AgendaView({ items, canEdit, onAdd, onUpdate, onDelete, canSee, apiKey }) {
            const [isA, sA] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [vMode, sV] = useState('cal');
            const [showPast, setShowPast] = useState(false);
            
            const today = new Date(); today.setHours(0,0,0,0);
            
            const visibleItems = items.filter(i => canSee(i.visibility)); 
            const upcomingItems = visibleItems.filter(i => new Date(i.date) >= today).sort((a,b) => new Date(a.date) - new Date(b.date));
            const pastItems = visibleItems.filter(i => new Date(i.date) < today).sort((a,b) => new Date(b.date) - new Date(a.date));

            const docs = items.filter(i => i.odjFile && canSee(i.visibility));

            const handleRemoveFile = async (id) => {
                const api = window.FB_API;
                await api.updateDoc(api.doc(api.db, 'artifacts', api.appId, 'public', 'data', 'agenda', id), { odjFile: null });
            };

            const RenderCard = ({ i }) => {
                return (
                    <div key={i.id} className="bg-white p-6 rounded-2xl border flex items-center justify-between hover:shadow-md transition-all group gap-6 text-slate-800">
                        <div className="flex items-start gap-6 font-sans">
                            <div className={`p-4 rounded-xl shadow-sm ${i.visibility==='Maître'?'bg-slate-100 text-slate-700':i.visibility==='Compagnon'?'bg-blue-50 text-blue-700':'bg-amber-50 text-amber-600'}`}><SmartIcon name={i.visibility==='Maître'?'Shield':i.visibility==='Compagnon'?'Star':'Calendar'} size={32} /></div>
                            <div className="font-sans">
                                <h3 className="font-bold text-xl capitalize font-serif">{new Date(i.date).toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' })}</h3>
                                <p className="text-[10px] font-black text-amber-700 uppercase tracking-widest mb-1 font-sans">{i.type} • Visibilité : {i.visibility}</p>
                                <div className="space-y-3 mt-2">
                                    <p className="text-slate-600 text-sm italic leading-relaxed font-serif">"{i.sujet}"</p>
                                    
                                    {i.planches && i.planches.length > 0 && (
                                        <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 mt-2">
                                            <p className="text-[10px] font-bold text-amber-700 uppercase tracking-widest mb-2 font-sans">Planches détectées :</p>
                                            <div className="space-y-1.5">
                                                {i.planches.map((p, idx) => {
                                                    const gradeLabel = p.grade || i.visibility;
                                                    if (!canSee(gradeLabel)) return null;
                                                    return (
                                                        <div key={idx} className="flex justify-between items-center text-xs bg-white p-2 rounded border border-slate-100 shadow-sm font-sans text-slate-800">
                                                            <span className="font-bold">"{p.title}"</span>
                                                            <span className="text-[9px] font-black uppercase text-slate-400">Par {p.author} ({gradeLabel})</span>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}

                                    {(i.agapes || i.entree || i.plat || i.dessert) && (
                                        <div className="bg-amber-50/50 p-3 rounded border border-amber-100/50 inline-block">
                                            <p className="text-[10px] font-bold text-amber-800 uppercase mb-1"><SmartIcon name="Utensils" size={10} className="mr-1 inline"/> Agapes {i.agapes ? `par ${i.agapes}` : ''}</p>
                                            {(i.entree||i.plat||i.dessert) && <p className="text-xs text-slate-600">Menu : {[i.entree, i.plat, i.dessert].filter(Boolean).join(' • ')}</p>}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        {canEdit && (
                            <div className="flex flex-col space-y-3">
                                <button onClick={() => setEditingItem(i)} className="text-slate-300 hover:text-amber-600 transition-colors font-sans" title="Modifier la tenue"><SmartIcon name="Edit2" size={18}/></button>
                                <button onClick={() => onDelete(i.id)} className="text-slate-300 hover:text-red-500 transition-colors font-sans" title="Supprimer la tenue"><SmartIcon name="Trash2" size={18}/></button>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="space-y-6 animate-fade font-sans text-slate-800">
                    <div className="bg-white p-6 rounded-2xl border flex flex-col md:flex-row justify-between items-center gap-4 shadow-sm font-sans">
                        <h2 className="text-2xl font-bold font-serif text-slate-800">Ordre des Travaux</h2>
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            <button onClick={()=>sV('cal')} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${vMode==='cal'?'bg-white text-amber-600 shadow-sm':'text-slate-500'}`}><SmartIcon name="Calendar" size={14} className="inline mr-2"/>CALENDRIER</button>
                            <button onClick={()=>sV('doc')} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${vMode==='doc'?'bg-white text-amber-600 shadow-sm':'text-slate-500'}`}><SmartIcon name="FileText" size={14} className="inline mr-2"/>DOCUMENTS</button>
                        </div>
                        {canEdit && <button onClick={()=>{sA(!isA); setEditingItem(null);}} className="bg-amber-600 text-white px-5 py-2 rounded-lg text-sm font-bold uppercase shadow-md font-serif tracking-widest"><SmartIcon name={isA?'X':'Plus'} size={18} /><span>Nouvelle Tenue</span></button>}
                    </div>

                    {(isA || editingItem) && (
                        <div className="bg-white p-8 rounded-2xl border mb-8 animate-fade shadow-xl font-sans">
                            <AgendaForm
                                key={editingItem ? editingItem.id : 'new'}
                                initialData={editingItem}
                                apiKey={apiKey}
                                onSave={async(d)=>{
                                    if(editingItem) {
                                        await onUpdate(editingItem.id, d);
                                        setEditingItem(null);
                                    } else {
                                        await onAdd(d);
                                        sA(false);
                                    }
                                }} 
                                onCancel={()=>{sA(false); setEditingItem(null);}}
                            />
                        </div>
                    )}
                    
                    {vMode === 'cal' ? (
                        <div className="space-y-6">
                            {/* Tenues à venir */}
                            {upcomingItems.length > 0 ? (
                                <div className="space-y-4">
                                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">À Venir</h3>
                                    {upcomingItems.map(i => <RenderCard key={i.id} i={i} />)}
                                </div>
                            ) : (
                                <p className="text-slate-400 italic py-10 text-center font-sans">Aucune tenue à venir.</p>
                            )}

                            {/* Archives des tenues passées */}
                            <div className="mt-8 pt-6 border-t border-slate-200">
                                <button 
                                    onClick={() => setShowPast(!showPast)} 
                                    className="w-full bg-slate-50 hover:bg-slate-100 p-4 rounded-xl border border-slate-200 flex items-center justify-between transition-all"
                                >
                                    <div className="flex items-center space-x-3 text-slate-600 font-bold">
                                        <SmartIcon name="Archive" size={20} className="text-amber-600"/>
                                        <span>Tenues Passées ({pastItems.length})</span>
                                    </div>
                                    <SmartIcon name={showPast ? "ChevronUp" : "ChevronDown"} size={16} className="text-slate-400"/>
                                </button>
                                
                                {showPast && (
                                    <div className="space-y-4 mt-4 animate-fade">
                                        {pastItems.length > 0 ? (
                                            pastItems.map(i => <RenderCard key={i.id} i={i} />)
                                        ) : (
                                            <p className="text-slate-400 italic py-6 text-center font-sans">Aucune tenue passée archivée pour le moment.</p>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade font-sans text-slate-800 font-sans">
                            {docs.map(f => (
                                <div key={f.id} className="bg-white p-6 rounded-2xl border flex flex-col shadow-sm hover:border-amber-400 transition-all group font-sans">
                                    <div className="flex items-center gap-4 mb-6 font-sans">
                                        <div className="p-3 bg-amber-50 text-amber-600 rounded-xl font-sans"><SmartIcon name="FileText" size={24}/></div>
                                        <div className="flex-grow min-w-0 font-serif font-bold"><p className="leading-tight truncate">{new Date(f.date).toLocaleDateString('fr-FR')}</p><p className="text-[10px] text-slate-400 font-bold uppercase mt-1 truncate font-sans">{f.type}</p></div>
                                    </div>
                                    <div className="flex items-center gap-2 border-t pt-4 mt-auto font-sans">
                                        <a href={f.odjFile.data} download={f.odjFile.name} className="flex-grow flex items-center justify-center gap-2 bg-amber-50 text-amber-700 font-black text-[10px] uppercase py-2.5 rounded-lg hover:bg-amber-100 transition-colors font-sans"><SmartIcon name="Download" size={14}/>Télécharger</a>
                                        {canEdit && (
                                            <button onClick={async()=>{ await handleRemoveFile(f.id); }} className="p-2.5 text-slate-300 hover:text-red-500 transition-colors font-sans"><SmartIcon name="Trash2" size={18}/></button>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function ArchiveForm({ initialData, onSave, onCancel }) {
            const [f, sF] = useState(initialData || { title:'', bookAuthor:'', grade:'Apprenti', description:'', docFile:null });
            
            const [uploading, setUploading] = useState(false);
            const handleFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploading(true);
                try {
                    const url = await window.FB_API.uploadFile(file, 'cg51/bibliotheque');
                    sF({...f, docFile: { name: file.name, data: url }});
                } catch (err) { console.error('Upload échoué', err); }
                setUploading(false);
            };

            return (
                <form onSubmit={async(e)=>{e.preventDefault(); await onSave(f);}} className="space-y-4 w-full">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" placeholder="Titre du document" value={f.title} onChange={e=>sF({...f,title:e.target.value})} className="border p-3 rounded-lg text-sm w-full font-bold outline-none focus:border-amber-500" required />
                        <input type="text" placeholder="Auteur" value={f.bookAuthor} onChange={e=>sF({...f,bookAuthor:e.target.value})} className="border p-3 rounded-lg text-sm w-full outline-none focus:border-amber-500" required />
                        <select value={f.grade} onChange={e=>sF({...f,grade:e.target.value})} className="border p-3 rounded-lg text-sm w-full outline-none focus:border-amber-500">
                            <option>Apprenti</option><option>Compagnon</option><option>Maître</option><option>Tous</option>
                        </select>
                    </div>
                    
                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <label className="text-[10px] font-bold text-slate-500 uppercase block mb-2 tracking-widest">Fichier joint (Optionnel)</label>
                        {!f.docFile ? (
                            <input type="file" onChange={handleFile} className="text-xs w-full" />
                        ) : (
                            <div className="flex items-center justify-between bg-white p-2 rounded border border-amber-200">
                                <div className="flex items-center text-amber-800 font-bold text-xs truncate"><SmartIcon name="FileText" className="mr-2" size={14}/>{f.docFile.name}</div>
                                <button type="button" onClick={()=>sF({...f, docFile: null})} className="text-red-500 hover:text-red-700 font-bold text-[10px] uppercase underline ml-2">Retirer</button>
                            </div>
                        )}
                        {uploading && <p className="text-[10px] font-bold text-amber-600 uppercase tracking-widest mt-2">Envoi du fichier...</p>}
                    </div>

                    <textarea placeholder="Pourquoi partager ce document ?" value={f.description} onChange={e=>sF({...f,description:e.target.value})} className="w-full border p-3 rounded-lg text-sm h-24 outline-none focus:border-amber-500" required></textarea>
                    <div className="flex justify-end space-x-3">
                        <button type="button" onClick={onCancel} className="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Annuler</button>
                        <button type="submit" className="bg-amber-600 text-white px-6 py-2 rounded-lg font-bold shadow-md uppercase text-[10px] tracking-widest">Enregistrer</button>
                    </div>
                </form>
            );
        }

        function BibliothequeView({ books, onAdd, onUpdate, onDelete, unlockedGrades, currentUser, reglementFile, onSaveReglement, isArchitect }) {
            const [isA, sA] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const list = books.filter(b => {
                const g = (b.grade||'').toLowerCase();
                if (g.includes('apprenti')) return unlockedGrades.apprenti;
                if (g.includes('compagnon')) return unlockedGrades.compagnon;
                if (g.includes('maître')||g.includes('maitre')) return unlockedGrades.maitre;
                return g.includes('tous');
            });
            const hasA = unlockedGrades.apprenti || unlockedGrades.compagnon || unlockedGrades.maitre;
            return (
                <div className="space-y-6 animate-fade">
                    <div className="bg-white p-6 rounded-2xl border flex flex-col md:flex-row justify-between items-center gap-4">
                        <div><h2 className="text-2xl font-serif flex items-center"><SmartIcon name="Library" className="mr-3 text-amber-600" size={24}/>Les Archives</h2><p className="text-slate-500 text-sm font-medium">Partagez vos lectures et documents par grade.</p></div>
                        {isArchitect && (
                            <button onClick={()=>sA(!isA)} className="bg-amber-600 text-white px-5 py-2 rounded-lg text-sm font-bold flex items-center space-x-2">
                                <SmartIcon name={isA?"X":"Plus"} size={18}/><span>Ajouter un Document</span>
                            </button>
                        )}
                    </div>

                    {hasA && (
                        <div className="bg-slate-900 text-white p-8 rounded-2xl shadow-lg mb-4 relative overflow-hidden flex flex-col md:flex-row items-center justify-between border-2 border-slate-800 animate-fade">
                            <div className="absolute -top-4 -right-4 opacity-10"><SmartIcon name="ScrollText" size={100}/></div>
                            <div className="relative z-10 text-center md:text-left mb-6 md:mb-0">
                                <h3 className="text-2xl font-serif font-bold text-amber-500 mb-1">Règlement Intérieur</h3>
                                <p className="text-slate-400 text-sm italic">La loi de notre Loge, accessible à tous les Frères et Sœurs.</p>
                            </div>
                            <div className="relative z-10 flex flex-col items-center md:items-end gap-3">
                                {reglementFile && reglementFile.data ? (
                                    <a href={reglementFile.data} download={reglementFile.name} className="bg-amber-600 hover:bg-amber-500 text-white px-6 py-3 rounded-xl font-bold uppercase tracking-widest text-xs flex items-center shadow-lg transition-all">
                                        <SmartIcon name="Download" size={16} className="mr-2"/> TÉLÉCHARGER LE PDF
                                    </a>
                                ) : (
                                    <p className="text-slate-500 text-xs italic">Document en cours de dépôt...</p>
                                )}
                                {isArchitect && (
                                    <label className="cursor-pointer text-[10px] text-amber-400 hover:text-amber-300 uppercase tracking-widest font-bold flex items-center transition-colors">
                                        <SmartIcon name="Upload" size={12} className="mr-1"/> Mettre à jour
                                        <input type="file" accept=".pdf" className="hidden" onChange={async (e)=>{
                                            const file = e.target.files[0]; if(!file) return;
                                            try {
                                                const url = await window.FB_API.uploadFile(file, 'cg51/reglement');
                                                onSaveReglement({ name: file.name, data: url });
                                            } catch(err) { console.error('Upload échoué', err); }
                                        }}/>
                                    </label>
                                )}
                            </div>
                        </div>
                    )}

                    {isA && <div className="bg-white p-6 rounded-2xl border shadow-lg">
                        <ArchiveForm onSave={async(d)=>{await onAdd(d); sA(false);}} onCancel={()=>sA(false)} />
                    </div>}
                    
                    {!hasA && !isA ? (
                        <div className="bg-slate-900 text-white p-12 rounded-2xl text-center border-4 border-double border-slate-800"><SmartIcon name="Shield" className="mx-auto mb-4 text-amber-500" size={40}/><h3 className="text-lg uppercase tracking-widest font-bold">Portes closes</h3><p className="text-slate-400 text-sm mt-2">Déverrouillez un grade pour y accéder.</p></div>
                    ) : list.length === 0 && !isA ? (
                        <div className="text-center py-20 text-slate-400 italic font-serif">Les archives sont vides pour ce grade.</div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {list.map(b => (
                                <div key={b.id} className="bg-white rounded-xl border flex flex-col h-full hover:shadow-lg transition-all group">
                                    {editingId === b.id ? (
                                        <div className="p-4 flex-grow"><ArchiveForm initialData={b} onSave={async(d)=>{await onUpdate(b.id, d); setEditingId(null);}} onCancel={()=>setEditingId(null)} /></div>
                                    ) : (
                                        <>
                                            <div className="h-44 bg-slate-100 relative flex items-center justify-center rounded-t-xl"><SmartIcon name="BookMarked" className="text-slate-300" size={40}/><div className="absolute top-2 right-2 bg-white/90 px-2 py-0.5 rounded text-[9px] font-bold uppercase shadow-sm border">{b.grade}</div></div>
                                            <div className="p-4 flex flex-col flex-grow">
                                                <h3 className="font-bold text-slate-900 text-sm">{b.title}</h3>
                                                <p className="text-[10px] font-bold text-amber-700 mb-3 uppercase tracking-tighter">{b.bookAuthor}</p>
                                                <p className="text-slate-600 text-[11px] italic line-clamp-3 mb-2 flex-grow">"{b.description}"</p>
                                                
                                                {b.docFile && (
                                                    <a href={b.docFile.data} download={b.docFile.name} className="mt-2 mb-4 block w-full bg-slate-800 hover:bg-slate-700 text-white text-center py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest transition-colors shadow-sm">
                                                        <SmartIcon name="Download" size={12} className="inline mr-2" />
                                                        Télécharger le Document
                                                    </a>
                                                )}

                                                <div className="pt-3 border-t flex justify-between items-center text-[9px] text-slate-400 mt-auto">
                                                    <span>Par {b.sharedBy}</span>
                                                    {isArchitect && (
                                                        <div className="flex space-x-2">
                                                            <button onClick={()=>setEditingId(b.id)} className="p-1.5 text-slate-400 hover:text-amber-600"><SmartIcon name="Edit2" size={14}/></button>
                                                            <button onClick={()=>onDelete(b.id)} className="p-1.5 text-slate-400 hover:text-red-500"><SmartIcon name="Trash2" size={14}/></button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function LienForm({ initialData, onSave, onCancel }) {

        function App() {
            const api = window.FB_API;
            const [fbUser, setFbUser] = useState(null);
            const [fbError, setFbError] = useState(null);
            const [isLogged, setIsLogged] = useState(false);
            const [memberName, setMemberName] = useState('');
            const [memberRole, setMemberRole] = useState('');
            const [activeView, setActiveView] = useState('home');
            const [unlockedGrades, setUnlockedGrades] = useState({ apprenti: false, compagnon: false, maitre: false });
            const [pendingGrade, setPendingGrade] = useState('');
            const [showGradesMenu, setShowGradesMenu] = useState(false);
            const [members, setMembers] = useState([]);
            const [agendaItems, setAgendaItems] = useState([]);
            const [planches, setPlanches] = useState([]);
            const [books, setBooks] = useState([]);
            const [liens, setLiens] = useState([]);
            const [logeLogo, setLogeLogo] = useState(null);
            const [logeIdentity, setLogeIdentity] = useState({ name: 'R∴L∴ Comte Guifré n°51', rite: '', obedience: '' });
            const [reglementFile, setReglementFile] = useState(null);
            const [claudeApiKey, setClaudeApiKey] = useState('');
            const [showApiKeyModal, setShowApiKeyModal] = useState(false);
            const [apiKeyInput, setApiKeyInput] = useState('');
            const [selectedPlanche, setSelectedPlanche] = useState(null);
            const [isArchitect, setIsArchitect] = useState(false);
            const [pendingNameMatch, setPendingNameMatch] = useState('');

            // canEdit définit les droits administrateur : ouvert aux Maîtres OU à l'Architecte
            const canEdit = unlockedGrades.maitre || isArchitect;
            
            const isVM = (memberRole || '').toLowerCase().includes('vénérable') || (memberRole || '').toLowerCase().includes('venerable');

            // 1. Initialisation de l'authentification Firebase
            useEffect(() => {
                if (!api) return;
                const unsubAuth = api.onAuthStateChanged(api.auth, u => {
                    setFbUser(u);
                });
                return () => unsubAuth();
            }, [api]);

            // 2. Chargement des données UNE FOIS que l'utilisateur est authentifié
            useEffect(() => {
                if (!api || !fbUser) return; // FIX DE SÉCURITÉ: Ne tente pas de lire la base sans être connecté

                const path = (c) => api.collection(api.db, 'artifacts', api.appId, 'public', 'data', c);
                
                const unsubLogo = api.onSnapshot(api.doc(api.db, 'artifacts', api.appId, 'public', 'data', 'settings', 'branding'), d => d.exists() && setLogeLogo(d.data().logoData));
                const unsubIdentity = api.onSnapshot(api.doc(api.db, 'artifacts', api.appId, 'public', 'data', 'settings', 'identity'), d => d.exists() ? setLogeIdentity(prev => ({...prev, ...d.data()})) : setLogeIdentity({ name: 'R∴L∴ Comte Guifré n°51', rite: '', obedience: '' }));
                const unsubReglement = api.onSnapshot(api.doc(api.db, 'artifacts', api.appId, 'public', 'data', 'settings', 'reglement'), d => d.exists() ? setReglementFile(d.data()) : setReglementFile(null));
                const unsubApiKey = api.onSnapshot(api.doc(api.db, 'artifacts', api.appId, 'public', 'data', 'settings', 'claudeapi'), d => { if(d.exists()) { setClaudeApiKey(d.data().key||''); setApiKeyInput(d.data().key||''); } });
                
                const unsubMembers = api.onSnapshot(path('members'), async (s) => {
                    if (s.empty) {
                        const batch = api.writeBatch(api.db);
                        LOGE_MEMBERS_INIT.forEach(m => batch.set(api.doc(path('members')), { ...m, phone:'', email:'', profession:'', photoData:'' }));
                        await batch.commit();
                    } else { setMembers(s.docs.map(d => ({ id: d.id, ...d.data() }))); }
                });
                const unsubAgenda = api.onSnapshot(path('agenda'), s => setAgendaItems(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubPlanches = api.onSnapshot(path('planches'), s => setPlanches(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubBiblio = api.onSnapshot(path('bibliotheque'), s => setBooks(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubLiens = api.onSnapshot(path('liens'), async (s) => {
                    if (s.empty) {
                        const batch = api.writeBatch(api.db);
                        LIENS_INIT.forEach(l => batch.set(api.doc(path('liens')), l));
                        await batch.commit();
                    } else { setLiens(s.docs.map(d => ({ id: d.id, ...d.data() }))); }
                });
                
                return () => { unsubLogo(); unsubIdentity(); unsubReglement(); unsubApiKey(); unsubMembers(); unsubAgenda(); unsubPlanches(); unsubBiblio(); unsubLiens(); };
            }, [api, fbUser]);

            const handleLogin = async (n, gradeKey, p) => {
                try {
                    await api.signInWithEmailAndPassword(api.auth, GRADE_ACCOUNTS[gradeKey], p.trim());
                } catch (e) {
                    return setFbError("Mot de passe incorrect pour ce grade.");
                }
                const grades = gradeKey === 'maitre' ? { apprenti:true, compagnon:true, maitre:true }
                    : gradeKey === 'compagnon' ? { apprenti:true, compagnon:true, maitre:false }
                    : { apprenti:true, compagnon:false, maitre:false };
                setUnlockedGrades(grades);
                setIsArchitect(false);
                setMemberName(n.trim());
                setMemberRole('');
                setPendingNameMatch(n.trim());
                setIsLogged(true); setFbError(null);
            };

            const handleArchitectLogin = async (pwd) => {
                try {
                    await api.signInWithEmailAndPassword(api.auth, ARCHITECT_ACCOUNT, pwd);
                } catch (e) {
                    return setFbError("Accès Architecte refusé.");
                }
                setUnlockedGrades({ apprenti:true, compagnon:true, maitre:true });
                setIsArchitect(true);
                setMemberName('Frère Laurent MIENVILLE');
                setMemberRole('Architecte');
                setIsLogged(true); setFbError(null);
            };

            // Une fois les membres chargés (après authentification), on retrouve le nom complet/role pour l'affichage et l'identité de Loge
            useEffect(() => {
                if (!pendingNameMatch || members.length === 0) return;
                const clean = (str) => str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/œ/g, "oe").replace(/v∴m∴|soeur|frere|[^a-z]/g, "");
                const search = clean(pendingNameMatch);
                const m = members.find(x => clean(x.name).includes(search) || search.includes(clean(x.name)));
                if (m) { setMemberName(m.name); setMemberRole(m.role); }
                setPendingNameMatch('');
            }, [members, pendingNameMatch]);

            const canSee = useCallback((v) => {
                const vis = (v || 'apprenti').toLowerCase().trim();
                if (unlockedGrades.maitre || isArchitect) return true;
                if (unlockedGrades.compagnon && (vis.includes('compagnon') || vis.includes('apprenti'))) return true;
                if (unlockedGrades.apprenti && vis.includes('apprenti')) return true;
                return false;
            }, [unlockedGrades, isArchitect]);

            const handleGradeUnlock = async (pwd) => {
                try {
                    await api.signInWithEmailAndPassword(api.auth, GRADE_ACCOUNTS[pendingGrade], pwd);
                } catch (e) {
                    return false;
                }
                let n = { ...unlockedGrades };
                if (pendingGrade === 'maitre') n = { apprenti: true, compagnon: true, maitre: true };
                else if (pendingGrade === 'compagnon') n = { ...n, apprenti: true, compagnon: true };
                else n.apprenti = true;
                setUnlockedGrades(n); setActiveView(pendingGrade); return true;
            };

            if (!isLogged) return <LoginScreen onLogin={handleLogin} onArchitectLogin={handleArchitectLogin} error={fbError} logo={logeLogo} logeName={logeIdentity.name} />;
            const loader = document.getElementById('loading-screen'); if (loader) loader.style.display = 'none';

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    <nav className="bg-slate-900 text-amber-500 shadow-xl sticky top-0 z-50 p-3 font-sans">
                        <div className="max-w-7xl mx-auto flex justify-between items-center gap-4 text-white">
                            <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setActiveView('home')}>
                                {logeLogo ? <img src={logeLogo} className="w-10 h-10 object-contain" /> : <SmartIcon name="Landmark" size={24} className="text-white"/>}
                                <span className="text-lg font-bold font-serif text-white tracking-widest uppercase hidden md:inline">{logeIdentity?.name || 'R∴L∴ Comte Guifré n°51'}</span>
                            </div>
                            <div className="flex flex-wrap justify-center items-center gap-2 font-serif text-[10px]">
                                <NavTab active={activeView==='home'} onClick={()=>setActiveView('home')} icon="landmark" label="Parvis" />
                                <NavTab active={activeView==='adherents'} onClick={()=>setActiveView('adherents')} icon="users" label="Tableau de Loge" />
                                <NavTab active={activeView==='agenda'} onClick={()=>setActiveView('agenda')} icon="calendar-days" label="Ordre des Travaux" />
                                <NavTab active={activeView==='bibliotheque'} onClick={()=>setActiveView('bibliotheque')} icon="book" label="Les Archives" />
                                <NavTab active={activeView==='liens'} onClick={()=>setActiveView('liens')} icon="link" label="Chaîne d'Union" />
                                
                                <div className="w-px h-6 bg-slate-700 mx-2 hidden lg:block"></div>
                                <div className="relative font-sans">
                                    <button onClick={() => setShowGradesMenu(!showGradesMenu)} className={`px-3 py-2 rounded-xl text-[10px] font-bold uppercase transition-all font-serif ${['apprenti','compagnon','maitre','read','write'].includes(activeView) ? 'bg-amber-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>Travaux Couverts</button>
                                    {showGradesMenu && (
                                        <div className="absolute top-full mt-2 right-0 w-40 rounded-xl shadow-2xl bg-slate-800 border border-slate-700 z-50 flex flex-col overflow-hidden animate-fade font-serif">
                                            {['apprenti', 'compagnon', 'maitre'].map(g => (
                                                <button key={g} onClick={() => { if(!unlockedGrades[g]) { setPendingGrade(g); setActiveView('grade_auth'); } else setActiveView(g); setShowGradesMenu(false); }} className="flex items-center px-4 py-3 text-slate-300 hover:bg-amber-600 hover:text-white border-b border-slate-700 last:border-0 uppercase font-bold text-[10px] tracking-widest"><SmartIcon name={unlockedGrades[g] ? "Unlock" : "Lock"} size={14} className="mr-3" />{g.toUpperCase()}</button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                {isArchitect && (
                                    <button onClick={()=>setShowApiKeyModal(true)} className={`px-3 py-2 rounded-xl text-[10px] font-bold uppercase transition-all font-serif ${claudeApiKey ? 'text-blue-400 hover:bg-slate-800' : 'text-red-400 hover:bg-slate-800'}`} title="Clé API Intelligence Artificielle">
                                        IA {claudeApiKey ? '✓' : '✗'}
                                    </button>
                                )}
                                <button onClick={() => { api.signOut(api.auth); setIsLogged(false); setIsArchitect(false); setUnlockedGrades({apprenti:false,compagnon:false,maitre:false}); setMemberName(''); setMemberRole(''); setActiveView('home'); }} className="p-2 text-slate-400 hover:text-red-500 transition-colors font-sans"><SmartIcon name="LogOut" size={20}/></button>
                            </div>
                        </div>
                    </nav>
                    {showApiKeyModal && (
                        <div className="fixed inset-0 bg-slate-900/90 z-[200] flex items-center justify-center p-4 animate-fade">
                            <div className="bg-white rounded-[2rem] p-8 max-w-md w-full shadow-2xl">
                                <h2 className="text-xl font-serif font-bold mb-2">Clé API Intelligence Artificielle</h2>
                                <p className="text-slate-500 text-sm mb-6">Permet l'analyse automatique des ODJ (grade, planche, auteur). Clé gratuite sur <strong>aistudio.google.com/app/apikey</strong>.</p>
                                <input type="password" value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} placeholder="AIza..." className="w-full border-2 p-3 rounded-xl text-sm outline-none focus:border-amber-500 font-mono mb-4" />
                                <div className="flex gap-3">
                                    <button onClick={()=>setShowApiKeyModal(false)} className="flex-1 text-slate-400 font-bold text-xs uppercase py-3 border rounded-xl">Annuler</button>
                                    {claudeApiKey && <button onClick={async()=>{ await api.setDoc(api.doc(api.db,'artifacts',api.appId,'public','data','settings','claudeapi'),{key:''}); setShowApiKeyModal(false); }} className="text-red-400 font-bold text-xs uppercase py-3 px-4 border border-red-200 rounded-xl">Supprimer</button>}
                                    <button onClick={async()=>{ await api.setDoc(api.doc(api.db,'artifacts',api.appId,'public','data','settings','claudeapi'),{key:apiKeyInput.trim()}); setShowApiKeyModal(false); }} className="flex-1 bg-amber-600 text-white font-bold text-xs uppercase py-3 rounded-xl shadow-md">Enregistrer</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <main className="max-w-7xl mx-auto px-4 py-8 flex-grow w-full font-sans">
                        {activeView === 'home' && <HomeView planchesCount={planches.length} logo={logeLogo} agendaItems={agendaItems} canSee={canSee} memberName={memberName.replace(/Frère |Sœur |V∴M∴ /gi, '')} onSaveLogo={async(file)=>{ const url = await api.uploadFile(file, 'cg51/branding'); await api.setDoc(api.doc(api.db,'artifacts',api.appId,'public','data','settings','branding'), {logoData:url}, {merge:true}); }} canEdit={canEdit} isArchitect={isArchitect} unlockedGrades={unlockedGrades} onUpdateAgenda={async(id,d)=>await api.updateDoc(api.doc(api.db,'artifacts',api.appId,'public','data','agenda',id),d)} logeIdentity={logeIdentity} onSaveIdentity={async(idData)=>await api.setDoc(api.doc(api.db,'artifacts',api.appId,'public','data','settings','identity'), idData, {merge:true})} isVM={isVM} />}
                        {activeView === 'adherents' && <AdherentsView members={members} onAdd={async(m)=>await api.addDoc(api.collection(api.db,'artifacts',api.appId,'public','data','members'),m)} onUpdate={async(id,d)=>await api.updateDoc(api.doc(api.db,'artifacts',api.appId,'public','data','members',id),d)} onDelete={async(id)=>await api.deleteDoc(api.doc(api.db,'artifacts',api.appId,'public','data','members',id))} canEdit={canEdit} />}
                        {activeView === 'bibliotheque' && <BibliothequeView books={books} onAdd={async(b)=>await api.addDoc(api.collection(api.db,'artifacts',api.appId,'public','data','bibliotheque'),{...b,sharedBy:memberName})} onUpdate={async(id,d)=>await api.updateDoc(api.doc(api.db,'artifacts',api.appId,'public','data','bibliotheque',id),d)} onDelete={async(id)=>await api.deleteDoc(api.doc(api.db,'artifacts',api.appId,'public','data','bibliotheque',id))} unlockedGrades={unlockedGrades} currentUser={memberName} reglementFile={reglementFile} onSaveReglement={async(f)=>await api.setDoc(api.doc(api.db,'artifacts',api.appId,'public','data','settings','reglement'), f)} isArchitect={isArchitect} />}
                        {activeView === 'liens' && <LiensUtilesView liens={liens} canEdit={isArchitect} onAdd={async(l)=>await api.addDoc(api.collection(api.db,'artifacts',api.appId,'public','data','liens'),l)} onUpdate={async(id,d)=>await api.updateDoc(api.doc(api.db,'artifacts',api.appId,'public','data','liens',id),d)} onDelete={async(id)=>await api.deleteDoc(api.doc(api.db,'artifacts',api.appId,'public','data','liens',id))} />}
                        {activeView === 'agenda' && <AgendaView items={agendaItems} canEdit={canEdit} onAdd={(t)=>api.addDoc(api.collection(api.db, 'artifacts', api.appId, 'public', 'data', 'agenda'), t)} onUpdate={async(id,d)=>await api.updateDoc(api.doc(api.db,'artifacts',api.appId,'public','data','agenda',id),d)} onDelete={(id)=>api.deleteDoc(api.doc(api.db, 'artifacts', api.appId, 'public', 'data', 'agenda', id))} canSee={canSee} apiKey={claudeApiKey} />}
                        {activeView === 'grade_auth' && <GradeAuthScreen grade={pendingGrade} onCancel={()=>setActiveView('home')} onValidate={handleGradeUnlock} logo={logeLogo} />}
                        {['apprenti','compagnon','maitre'].includes(activeView) && <PlanchesView activeGrade={activeView} planches={planches.filter(p=>normalizeGrade(p.grade)===activeView)} onRead={p=>{setSelectedPlanche(p);setActiveView('read');}} onWrite={()=>setActiveView('write')} />}
                        {activeView === 'read' && <ReadPlancheView planche={selectedPlanche} onBack={()=>setActiveView(normalizeGrade(selectedPlanche.grade))} onDelete={async(id)=>{await api.deleteDoc(api.doc(api.db,'artifacts',api.appId,'public','data','planches',id)); setActiveView(normalizeGrade(selectedPlanche.grade));}} currentUser={memberName} isArchitect={isArchitect} />}
                        {activeView === 'write' && <WritePlancheView onBack={()=>setActiveView('home')} onSubmit={async(p)=>{await api.addDoc(api.collection(api.db,'artifacts',api.appId,'public','data','planches'),{...p,submittedBy:memberName}); setActiveView(normalizeGrade(p.grade));}} defaultGrade="apprenti" currentUser={memberName} />}
                    </main>
                    <footer className="py-8 text-center text-slate-400 text-[10px] uppercase font-bold tracking-[0.2em] border-t bg-white font-serif">{logeIdentity?.name || 'R∴L∴ Comte Guifré n°51'} — Orient de Perpignan</footer>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        if (rootElement && !rootElement._reactRoot) {
            const root = ReactDOM.createRoot(rootElement);
            rootElement._reactRoot = root;
            root.render(<App />);
        }
    </script>
</body>
</html>
